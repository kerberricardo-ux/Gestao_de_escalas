<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas Operacionais</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ef4444;
            --warning: #f97316;
            --info: #3b82f6;
            --border: #333;
            --cor-t: #22c55e;
            --cor-fo: #000000;
            --cor-f: #ef4444;
            --cor-su: #ea580c;
            --cor-at: #06b6d4;
            --cor-fe: #3b82f6;
            --cor-hi: #16a34a;
            --cor-fg: #84cc16;
            --cor-c: #f97316;
            --cor-af: #8b5cf6;
            --cor-tc: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #000;
            padding: 20px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .sidebar button {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 15px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .sidebar button:hover,
        .sidebar button.active-nav {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent);
        }

        .content {
            margin-left: 220px;
            padding: 30px;
            width: calc(100% - 220px);
        }

        section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .stat-card.alert {
            border-bottom-color: var(--danger);
        }

        .filter-select {
            background: #2c2c2c;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            border-left: 6px solid var(--danger);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }

        .card.minimo-insuficiente {
            border-left-color: var(--warning) !important;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            animation: pulse-warning 2s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.6); }
        }

        .card.active-status {
            border-left-color: var(--accent);
        }

        .card.cobertura-ativa {
            border-left-color: var(--info) !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .card-count {
            position: absolute;
            bottom: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            border: 1px solid rgba(0, 230, 118, 0.3);
            text-transform: uppercase;
        }

        .card-count.minimo-alerta {
            background: rgba(249, 115, 22, 0.2);
            color: var(--warning);
            border-color: rgba(249, 115, 22, 0.5);
            font-size: 0.8rem;
        }

        .card-count.cobertura-badge {
            background: rgba(59, 130, 246, 0.18);
            color: var(--info);
            border-color: rgba(59, 130, 246, 0.45);
        }

        .btn-cobertura {
            background: var(--info);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-cobertura:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .cobertura-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.85rem;
            color: var(--info);
            font-weight: 500;
            margin-top: 8px;
        }

        .form-container {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        input, select {
            background: #2c2c2c;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 5px;
            flex: 1;
            min-width: 150px;
        }

        .btn-add, .btn-edit, .btn-save, .btn-cancel {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 5px;
        }

        .btn-edit, .btn-save { background: var(--info); }
        .btn-cancel { background: var(--warning); color: white; }
        .btn-remove {
            background: var(--danger);
            color: white;
            border: none;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 5px;
        }

        .list-item {
            background: var(--bg-card);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }

        .modal-content {
            background: var(--bg-card);
            margin: 2% auto;
            padding: 20px;
            width: 95%;
            max-width: 1400px;
            max-height: 95vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .close {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: bold;
            line-height: 1;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .close:hover { background: rgba(255,255,255,0.1); }

        .escala-container {
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px 0;
        }

        .agente-bloco {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .agente-header {
            background: linear-gradient(135deg, var(--bg-card), #2a2a2a);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            color: var(--accent);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .escala-row {
            display: grid;
            grid-template-columns: repeat(31, 1fr);
            gap: 1px;
            background: var(--border);
            padding: 8px 0;
        }

        .dia-cell, .sigla-cell {
            background: var(--bg-card);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dia-cell { font-size: 0.75rem; color: var(--text-secondary); min-height: 32px; }
        .sigla-cell { font-size: 0.85rem; font-weight: bold; min-height: 36px; cursor: pointer; border-radius: 4px; transition: 0.2s; }

        .sigla-T { background: var(--cor-t) !important; color: white; }
        .sigla-FO { background: var(--cor-fo) !important; color: #555; }
        .sigla-F { background: var(--cor-f) !important; color: white; }
        .sigla-SU { background: var(--cor-su) !important; color: white; }
        .sigla-AT { background: var(--cor-at) !important; color: white; }
        .sigla-FE { background: var(--cor-fe) !important; color: white; }
        .sigla-HI { background: var(--cor-hi) !important; color: white; }
        .sigla-FG { background: var(--cor-fg) !important; color: white; }
        .sigla-C { background: var(--cor-c) !important; color: white; }
        .sigla-AF { background: var(--cor-af) !important; color: white; }
        .sigla-TC { background: var(--cor-tc) !important; color: white; }

        @media (max-width: 768px) {
            .content { margin-left: 0; width: 100%; padding: 15px; }
            .sidebar { transform: translateX(-100%); }
            .escala-row { grid-template-columns: repeat(15, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SENTINELA GESTÃO DE ESCALAS</div>
        <button onclick="showSection('dashboard_gerencial')" id="nav-dashboard_gerencial" class="active-nav">
            <span class="material-icons">analytics</span> <span>Gerencial</span>
        </button>
        <button onclick="showSection('dashboard')" id="nav-dashboard">
            <span class="material-icons">monitor_heart</span> <span>Tempo Real</span>
        </button>
        <button onclick="showSection('postos')" id="nav-postos">
            <span class="material-icons">business</span> <span>Postos</span>
        </button>
        <button onclick="showSection('equipe')" id="nav-equipe">
            <span class="material-icons">groups</span> <span>Equipe</span>
        </button>
    </nav>

    <main class="content">
        <section id="dashboard_gerencial" class="active">
            <div class="stats-header">
                <h2>Resumo Gerencial</h2>
                <select id="filtro-periodo" class="filter-select" onchange="renderAll()">
                    <option value="dia">Hoje</option>
                    <option value="mes">Mês Atual</option>
                </select>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3>Postos Ativos</h3><div class="value" id="stat-postos">0</div></div>
                <div class="stat-card"><h3>Efetivo Total</h3><div class="value" id="stat-agentes">0</div></div>
                <div class="stat-card alert"><h3>Faltas</h3><div class="value" id="stat-faltas">0</div></div>
                <div class="stat-card alert"><h3>Suspensões</h3><div class="value" id="stat-suspensoes">0</div></div>
                <div class="stat-card"><h3>Atestados</h3><div class="value" id="stat-atestados">0</div></div>
            </div>
            <div class="grid-cards">
                <div class="stat-card" style="text-align: left; grid-column: span 2; border-bottom: none;">
                    <h3 style="margin-bottom: 15px;"><span class="material-icons" style="vertical-align: middle;">list</span> Lista de Unidades</h3>
                    <div id="lista-unidades-gestao" style="font-size: 0.9rem; line-height: 1.8; color: var(--text-secondary);"></div>
                </div>
            </div>
        </section>

        <section id="dashboard">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Painel Operacional</h2>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button onclick="alterarDia(-1)">◀</button>
                    <div id="current-date" style="font-weight: bold; color: var(--accent);"></div>
                    <button onclick="alterarDia(1)">▶</button>
                </div>
            </header>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <section id="postos">
            <h2>Gestão de Unidades</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome da Unidade">
                <input type="number" id="posto-minimo" placeholder="Mínimo" min="1" max="50">
                <button class="btn-add" onclick="addPosto()">Criar Posto</button>
            </div>
            <div id="lista-postos"></div>
        </section>

        <section id="equipe">
            <h2>Gestão de Agentes</h2>
            <div class="form-container">
                <input type="text" id="func-nome" placeholder="Nome Completo">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="2x1">2x1</option>
                    <option value="5x1">5x1</option>
                    <option value="6x1">6x1</option>
                    <option value="4x2">4x2</option>
                </select>
                <input type="date" id="func-inicio">
                <button class="btn-add" onclick="addAgente()">Cadastrar</button>
            </div>
            <div id="lista-equipe"></div>
        </section>

        <div id="modal-escala" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-titulo">Escala</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="escala-container" id="escala-content"></div>
            </div>
        </div>

        <div id="modal-edit-agente" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-edit-titulo">Editar Agente</h3>
                    <span class="close" onclick="closeEditModal()">&times;</span>
                </div>
                <form class="form-container" id="form-edit-agente">
                    <input type="hidden" id="edit-agente-id">
                    <input type="text" id="edit-agente-nome" placeholder="Nome Completo" required>
                    <select id="edit-agente-posto" required></select>
                    <select id="edit-agente-escala" required>
                        <option value="12x36">12x36</option>
                        <option value="2x1">2x1</option>
                        <option value="5x1">5x1</option>
                        <option value="6x1">6x1</option>
                        <option value="4x2">4x2</option>
                    </select>
                    <input type="date" id="edit-agente-inicio" required>
                </form>
                <div style="display: flex; gap: 10px; justify-content: flex-end; padding: 10px;">
                    <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
                    <button class="btn-save" onclick="saveEditAgente()">Salvar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co';
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {}, coberturas: {} };
        let dataSelecionada = new Date();

        function formatarDataISO(data) {
            const ano = data.getFullYear();
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const dia = String(data.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        }

        function atualizarDataDisplay() {
            document.getElementById('current-date').innerText =
                dataSelecionada.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        function alterarDia(dias) {
            dataSelecionada.setDate(dataSelecionada.getDate() + dias);
            atualizarDataDisplay();
            renderAll();
        }

        // ATUALIZADO: Verificação por Data
        function possuiCoberturaAtiva(postoId, data) {
            return Boolean(localDB.coberturas[`${postoId}-${data}`]);
        }

        // ATUALIZADO: getResumoPosto agora recebe dataRef
        function getResumoPosto(posto, dataRef) {
            const ags = localDB.equipe.filter(e => e.posto_id === posto.id);
            const minimo = posto.minimo || 1;
            const servicoNoPosto = ags.filter(a => {
                const siglaAtual = localDB.ocorrencias[`${a.id}-${dataRef}`] || (isTrabalho(dataRef, a.inicio, a.escala) ? 'T' : 'FO');
                return ['T', 'HI', 'C', 'FG'].includes(siglaAtual);
            });
            const coberturaAtiva = possuiCoberturaAtiva(posto.id, dataRef);
            const totalEfetivo = servicoNoPosto.length + (coberturaAtiva ? 1 : 0);
            return { ags, minimo, servicoNoPosto, coberturaAtiva, totalEfetivo, temMinimoSuficiente: totalEfetivo >= minimo };
        }

        // ATUALIZADO: Salva cobertura vinculada ao dia
        async function definirCobertura(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            const dataIso = formatarDataISO(dataSelecionada);
            const nomeAtual = localDB.coberturas[`${postoId}-${dataIso}`] || '';
            
            const nome = prompt(`Quem cobrirá o posto "${posto.nome}" no dia ${dataSelecionada.toLocaleDateString()}?`, nomeAtual);
            
            if (nome !== null) {
                try {
                    if (nome.trim() === '') {
                        await _supabase.from('coberturas').delete().match({ posto_id: postoId, data: dataIso });
                    } else {
                        await _supabase.from('coberturas').upsert({ posto_id: postoId, data: dataIso, nome: nome.trim() });
                    }
                    await sync();
                } catch (err) { console.error(err); }
            }
        }

        async function sync() {
            try {
                const { data: p } = await _supabase.from('postos').select('*').order('nome');
                const { data: e } = await _supabase.from('equipe').select('*').order('nome');
                const { data: o } = await _supabase.from('ocorrencias').select('*');
                const { data: c } = await _supabase.from('coberturas').select('*'); // ATUALIZADO: Busca coberturas

                localDB.postos = p || [];
                localDB.equipe = e || [];
                localDB.ocorrencias = {};
                localDB.coberturas = {}; // ATUALIZADO: Inicializa coberturas

                o?.forEach(occ => { localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla; });
                c?.forEach(cob => { localDB.coberturas[`${cob.posto_id}-${cob.data}`] = cob.nome; }); // ATUALIZADO: Popula coberturas

                renderAll();
            } catch (err) { console.error(err); }
        }

        function isTrabalho(data, inicio, escala) {
            const dI = new Date(inicio + 'T00:00:00');
            const dA = new Date(data + 'T00:00:00');
            const diff = Math.floor((dA - dI) / 86400000);
            if (diff < 0) return false;
            switch (escala) {
                case '12x36': return diff % 2 === 0;
                case '2x1': return diff % 3 < 2;
                case '5x1': return diff % 6 < 5;
                case '6x1': return diff % 7 < 6;
                case '4x2': return diff % 6 < 4;
                default: return false;
            }
        }

        function renderAll() {
            const hoje = formatarDataISO(dataSelecionada);
            let totalFaltas = 0, totalSu = 0, totalAt = 0;
            localDB.equipe.forEach(ag => {
                const s = localDB.ocorrencias[`${ag.id}-${hoje}`];
                if (s === 'F') totalFaltas++;
                if (s === 'SU') totalSu++;
                if (s === 'AT') totalAt++;
            });

            document.getElementById('stat-postos').innerText = localDB.postos.length;
            document.getElementById('stat-agentes').innerText = localDB.equipe.length;
            document.getElementById('stat-faltas').innerText = totalFaltas;
            document.getElementById('stat-suspensoes').innerText = totalSu;
            document.getElementById('stat-atestados').innerText = totalAt;

            document.getElementById('lista-unidades-gestao').innerHTML = localDB.postos.map(p => `• ${p.nome} (${p.minimo || 1} mín.)`).join('<br>');

            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            localDB.postos.forEach(p => {
                const { minimo, servicoNoPosto, coberturaAtiva, totalEfetivo, temMinimoSuficiente } = getResumoPosto(p, hoje);
                const classesCard = ['card', totalEfetivo > 0 ? 'active-status' : '', coberturaAtiva ? 'cobertura-ativa' : '', !temMinimoSuficiente && !coberturaAtiva ? 'minimo-insuficiente' : ''].filter(Boolean).join(' ');
                
                let statusText = '🔴 VAGO';
                if (coberturaAtiva) statusText = '🟢 COBERTO';
                else if (!temMinimoSuficiente) statusText = `⚠️ ABAIXO DO MÍNIMO (${minimo})`;
                else if (servicoNoPosto.length > 0) statusText = '🟢 OPERACIONAL';
                
                let badgeClass = coberturaAtiva ? 'cobertura-badge' : (!temMinimoSuficiente ? 'minimo-alerta' : '');
                
                // ATUALIZADO: Busca nome da cobertura no localDB
                const nomeCobertura = localDB.coberturas[`${p.id}-${hoje}`] || '';

                const card = document.createElement('div');
                card.className = classesCard;
                card.innerHTML = `<h3>${p.nome}</h3><p>${statusText}</p><div class="card-count ${badgeClass}">${totalEfetivo}/${minimo} EFETIVO</div>
                    ${coberturaAtiva ? `<div class="cobertura-info">Cobertura: ${nomeCobertura}</div>` : ''}
                    ${(!temMinimoSuficiente || coberturaAtiva) ? `<button class="btn-cobertura" onclick="event.stopPropagation(); definirCobertura('${p.id}')">${coberturaAtiva ? 'Editar Cobertura' : 'Definir Cobertura'}</button>` : ''}`;
                card.onclick = () => openEscala(p.id);
                container.appendChild(card);
            });

            const selectPostos = localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('func-posto-select').innerHTML = '<option value="">Posto...</option>' + selectPostos;

            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => `
                <div class="list-item"><span>${p.nome} <strong>(${p.minimo} mín.)</strong></span>
                <div><button class="btn-edit" onclick="editMinimo('${p.id}')">Mínimo</button>
                <button class="btn-remove" onclick="removePosto('${p.id}')">Excluir</button></div></div>`).join('');

            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => `
                <div class="list-item"><span>${e.nome} - ${localDB.postos.find(p => p.id === e.posto_id)?.nome || 'S/P'} (${e.escala})</span>
                <div><button class="btn-edit" onclick="editAgente('${e.id}')">Editar</button>
                <button class="btn-remove" onclick="removeAgente('${e.id}')">Remover</button></div></div>`).join('');
        }

        function openEscala(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            if (!posto) return;
            document.getElementById('modal-titulo').innerText = `Escala: ${posto.nome}`;
            const agora = new Date(dataSelecionada), ano = agora.getFullYear(), mes = agora.getMonth() + 1;
            const diasMes = new Date(ano, mes, 0).getDate();
            const agentesPosto = localDB.equipe.filter(e => e.posto_id === postoId);
            let html = agentesPosto.length ? '' : '<div class="agente-header">Nenhum agente vinculado</div>';
            agentesPosto.forEach(agente => {
                html += `<div class="agente-bloco"><div class="agente-header">${agente.nome} (${agente.escala})</div>
                    <div class="escala-row">${Array.from({ length: diasMes }, (_, i) => `<div class="dia-cell">${i + 1}</div>`).join('')}</div>
                    <div class="escala-row">${Array.from({ length: diasMes }, (_, i) => {
                        const dStr = `${ano}-${String(mes).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                        const sigla = localDB.ocorrencias[`${agente.id}-${dStr}`] || (isTrabalho(dStr, agente.inicio, agente.escala) ? 'T' : 'FO');
                        return `<div class="sigla-cell sigla-${sigla}" onclick="setSiglaVertical('${agente.id}', '${dStr}', '${postoId}')">${sigla}</div>`;
                    }).join('')}</div></div>`;
            });
            document.getElementById('escala-content').innerHTML = html;
            document.getElementById('modal-escala').style.display = 'block';
        }

        async function setSiglaVertical(agenteId, data, postoId) {
            const sigla = prompt("SIGLA: T, FO, FG, F, SU, HI, C, AT, FE, AF, TC ou L (Limpar)")?.toUpperCase().trim();
            if (sigla === 'L') { try { await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data }); } catch(err){console.error(err);} }
            else if (sigla) { try { await _supabase.from('ocorrencias').upsert({ agente_id: agenteId, data, sigla }); } catch(err){console.error(err);} }
            await sync(); openEscala(postoId);
        }

        async function addPosto() {
            const n = document.getElementById('posto-nome'), m = document.getElementById('posto-minimo');
            if (n.value.trim() && m.value) {
                try {
                    const { error } = await _supabase.from('postos').insert([{ nome: n.value.trim(), minimo: parseInt(m.value) }]);
                    if (error) throw error;
                    n.value = ""; m.value = ""; await sync();
                } catch (err) { console.error(err); }
            }
        }

        async function addAgente() {
            const n = document.getElementById('func-nome'), p = document.getElementById('func-posto-select'), e = document.getElementById('func-escala'), i = document.getElementById('func-inicio');
            if (n.value.trim() && p.value && i.value) {
                try {
                    const { error } = await _supabase.from('equipe').insert([{ nome: n.value.trim(), posto_id: p.value, escala: e.value, inicio: i.value }]);
                    if (error) throw error;
                    n.value = ""; p.value = ""; i.value = ""; await sync();
                } catch (err) { console.error(err); }
            }
        }

        async function removePosto(id) {
            if (confirm("Tem certeza?")) {
                try { await _supabase.from('postos').delete().eq('id', id); await sync(); } catch (err) { console.error(err); }
            }
        }

        async function removeAgente(id) {
            if (confirm("Tem certeza?")) {
                try { await _supabase.from('equipe').delete().eq('id', id); await sync(); } catch (err) { console.error(err); }
            }
        }

        async function editMinimo(id) {
            const p = localDB.postos.find(x => x.id === id);
            const nMin = prompt(`Novo mínimo para ${p.nome}:`, p.minimo);
            if (nMin && !isNaN(nMin)) {
                try { await _supabase.from('postos').update({ minimo: parseInt(nMin) }).eq('id', id); await sync(); } catch (err) { console.error(err); }
            }
        }

        function editAgente(id) {
            const e = localDB.equipe.find(x => x.id === id);
            document.getElementById('edit-agente-id').value = e.id;
            document.getElementById('edit-agente-nome').value = e.nome;
            document.getElementById('edit-agente-escala').value = e.escala;
            document.getElementById('edit-agente-inicio').value = e.inicio;
            const s = document.getElementById('edit-agente-posto');
            s.innerHTML = document.getElementById('func-posto-select').innerHTML;
            s.value = e.posto_id;
            document.getElementById('modal-edit-agente').style.display = 'block';
        }

        async function saveEditAgente() {
            const id = document.getElementById('edit-agente-id').value;
            const dados = {
                nome: document.getElementById('edit-agente-nome').value.trim(),
                posto_id: document.getElementById('edit-agente-posto').value,
                escala: document.getElementById('edit-agente-escala').value,
                inicio: document.getElementById('edit-agente-inicio').value
            };
            if (dados.nome && dados.posto_id && dados.inicio) {
                try { await _supabase.from('equipe').update(dados).eq('id', id); closeEditModal(); await sync(); } catch (err) { console.error(err); }
            }
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
        }

        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        function closeEditModal() { document.getElementById('modal-edit-agente').style.display = 'none'; }

        window.onload = () => { atualizarDataDisplay(); sync(); };
        window.onclick = (e) => { if (e.target.className === 'modal') { closeModal(); closeEditModal(); } };
    </script>
</body>
</html>
