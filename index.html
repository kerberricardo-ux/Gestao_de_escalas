<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas Operacionais</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212; --bg-card: #1e1e1e; --accent: #00e676;
            --text-primary: #ffffff; --text-secondary: #b0b0b0;
            --danger: #ef4444; --warning: #f97316; --info: #3b82f6; --border: #333;
            --cor-t: #22c55e; --cor-fo: #000000; --cor-f: #ef4444;
            --cor-su: #ea580c; --cor-at: #06b6d4; --cor-fe: #3b82f6;
            --cor-hi: #16a34a; --cor-fg: #84cc16; --cor-c: #f97316;
            --cor-af: #8b5cf6; --cor-tc: #374151;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); display: flex; min-height: 100vh; }

        /* Sidebar e Layout */
        .sidebar { width: 220px; background: #000; padding: 20px; position: fixed; height: 100vh; border-right: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active-nav { background: rgba(0, 230, 118, 0.1); color: var(--accent); }
        .content { margin-left: 220px; padding: 30px; width: calc(100% - 220px); }

        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards e Stats */
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 6px solid var(--danger); cursor: pointer; transition: 0.2s; position: relative; min-height: 120px; }
        .card:hover { transform: translateY(-3px); background: #252525; }
        .card.active-status { border-left-color: var(--accent); }
        .card.cobertura-ativa { border-left-color: var(--info); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .card-count { position: absolute; bottom: 12px; right: 12px; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: rgba(0,0,0,0.3); }

        /* Formulários e Inputs */
        .form-container { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; border: 1px solid var(--border); }
        input, select { background: #2c2c2c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; flex: 1; min-width: 150px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        
        .btn-add, .btn-save { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { filter: brightness(1.1); }
        .btn-cancel { background: #333; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; }

        /* Modal e Escala */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-card); margin: 5% auto; padding: 25px; width: 90%; max-width: 1100px; border-radius: 15px; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        
        .escala-row { display: grid; grid-template-columns: repeat(31, 1fr); gap: 2px; background: var(--border); padding: 5px 0; }
        .dia-cell, .sigla-cell { background: var(--bg-card); text-align: center; padding: 8px 0; font-size: 0.75rem; }
        .sigla-cell { cursor: pointer; font-weight: bold; transition: 0.2s; }
        .sigla-cell:hover { filter: brightness(1.5); transform: scale(1.1); }

        /* Novas Classes UX */
        .notification { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; z-index: 2000; animation: slideIn 0.3s ease; color: white; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .sigla-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
        .sigla-btn { padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-align: center; color: white; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px; }
            .sidebar button span:last-child, .logo { display: none; }
            .content { margin-left: 60px; width: calc(100% - 60px); }
            .escala-row { grid-template-columns: repeat(10, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SENTINELA</div>
        <button onclick="showSection('dashboard_gerencial')" id="nav-dashboard_gerencial" class="active-nav"><span class="material-icons">analytics</span><span>Gerencial</span></button>
        <button onclick="showSection('dashboard')" id="nav-dashboard"><span class="material-icons">monitor_heart</span><span>Tempo Real</span></button>
        <button onclick="showSection('postos')" id="nav-postos"><span class="material-icons">business</span><span>Postos</span></button>
        <button onclick="showSection('equipe')" id="nav-equipe"><span class="material-icons">groups</span><span>Equipe</span></button>
    </nav>

    <main class="content">
        <section id="dashboard_gerencial" class="active">
            <div class="stats-header">
                <h2>Resumo Gerencial</h2>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button onclick="alterarDia(-1)" class="sidebar button" style="width: auto; padding: 5px;"><span class="material-icons">chevron_left</span></button>
                    <div id="current-date-gerencial" style="font-weight: bold; color: var(--accent); min-width: 150px; text-align: center;"></div>
                    <button onclick="alterarDia(1)" class="sidebar button" style="width: auto; padding: 5px;"><span class="material-icons">chevron_right</span></button>
                </div>
            </div>
            <div class="form-container">
                <select id="filtro-posto-gerencial" onchange="renderGerencial()"><option value="">Todas Unidades</option></select>
                <select id="filtro-ocorrencia-gerencial" onchange="renderGerencial()"><option value="">Todas Ocorrências</option><option value="F">Faltas (F)</option><option value="SU">Suspensões (SU)</option></select>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3>Ativos</h3><div class="value" id="stat-postos">0</div></div>
                <div class="stat-card"><h3>Equipe</h3><div class="value" id="stat-agentes">0</div></div>
                <div class="stat-card" style="border-color: var(--danger)"><h3>Faltas</h3><div class="value" id="stat-faltas">0</div></div>
                <div class="stat-card" style="border-color: var(--warning)"><h3>Suspensões</h3><div class="value" id="stat-suspensoes">0</div></div>
            </div>
            <div class="grid-cards">
                <div class="stat-card" style="text-align: left; grid-column: span 1; border-bottom: none;">
                    <h3 style="margin-bottom:10px">Unidades</h3>
                    <div id="lista-unidades-gestao"></div>
                </div>
                <div class="stat-card" style="text-align: left; grid-column: span 1; border-bottom: none;">
                    <h3 style="margin-bottom:10px">Ausências e Coberturas</h3>
                    <div id="lista-ausencias-gerencial"></div>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #333;">
                    <div id="lista-coberturas-gerencial"></div>
                </div>
            </div>
        </section>

        <section id="dashboard">
            <header class="stats-header">
                <h2>Painel Operacional</h2>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button onclick="alterarDia(-1)" style="color:var(--accent); background:none; border:none; cursor:pointer;"><span class="material-icons">chevron_left</span></button>
                    <div id="current-date" style="font-weight:bold; color:var(--accent)"></div>
                    <button onclick="alterarDia(1)" style="color:var(--accent); background:none; border:none; cursor:pointer;"><span class="material-icons">chevron_right</span></button>
                </div>
            </header>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <section id="postos">
            <h2>Unidades</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome da Unidade">
                <input type="number" id="posto-minimo" placeholder="Mínimo de Efetivo" min="1">
                <button class="btn-add" onclick="addPosto()">Criar Unidade</button>
            </div>
            <div id="lista-postos"></div>
        </section>

        <section id="equipe">
            <h2>Equipe</h2>
            <div class="form-container">
                <input type="text" id="func-nome" placeholder="Nome do Agente">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option><option value="2x1">2x1</option><option value="5x1">5x1</option><option value="6x1">6x1</option><option value="4x2">4x2</option>
                </select>
                <input type="date" id="func-inicio">
                <button class="btn-add" onclick="addAgente()">Cadastrar</button>
            </div>
            <div id="lista-equipe"></div>
        </section>
    </main>

    <div id="modal-escala" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modal-titulo">Escala</h3><span class="close material-icons" onclick="closeModal()">close</span></div>
            <div id="escala-content"></div>
        </div>
    </div>

    <div id="modal-sigla" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header"><h3>Alterar Status</h3><span class="close material-icons" onclick="closeSiglaModal()">close</span></div>
            <p id="sigla-info" style="margin-bottom:15px; font-size:0.9rem; color:var(--text-secondary)"></p>
            <div class="sigla-selector" id="sigla-buttons-container"></div>
        </div>
    </div>

    <div id="modal-cobertura" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header"><h3>Definir Cobertura</h3><span class="close material-icons" onclick="closeCoberturaModal()">close</span></div>
            <input type="text" id="cob-nome" placeholder="Nome do colaborador" style="width:100%; margin-bottom:15px;">
            <div style="display:flex; gap:10px">
                <button class="btn-save" onclick="salvarCoberturaVisual()" style="flex:1">Salvar</button>
                <button class="btn-cancel" onclick="removerCoberturaVisual()" style="background:var(--danger)">Limpar</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co';
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {}, coberturas: {} };
        let dataSelecionada = new Date();
        let siglaContexto = null;
        let coberturaContexto = null;

        // --- FUNÇÕES DE DATA (LOCAL TIME) ---
        function formatarDataISO(data) {
            const d = new Date(data);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function atualizarDataDisplay() {
            const opt = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('current-date').innerText = dataSelecionada.toLocaleDateString('pt-BR', opt);
            document.getElementById('current-date-gerencial').innerText = dataSelecionada.toLocaleDateString('pt-BR', opt);
        }

        function alterarDia(dias) {
            dataSelecionada.setDate(dataSelecionada.getDate() + dias);
            atualizarDataDisplay();
            renderAll();
        }

        // --- NOTIFICAÇÕES (UX) ---
        function notificar(msg, tipo = 'info') {
            const div = document.createElement('div');
            div.className = `notification`;
            div.style.backgroundColor = tipo === 'error' ? 'var(--danger)' : 'var(--accent)';
            div.style.color = tipo === 'error' ? 'white' : 'black';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // --- LÓGICA DE NEGÓCIO (NÃO ALTERADA) ---
        function isTrabalho(data, inicio, escala) {
            const dI = new Date(inicio + 'T00:00:00');
            const dA = new Date(data + 'T00:00:00');
            const diff = Math.floor((dA - dI) / 86400000);
            if (diff < 0) return false;
            switch (escala) {
                case '12x36': return diff % 2 === 0;
                case '2x1': return diff % 3 < 2;
                case '5x1': return diff % 6 < 5;
                case '6x1': return diff % 7 < 6;
                case '4x2': return diff % 6 < 4;
                default: return false;
            }
        }

        function possuiCoberturaAtiva(postoId, data) { return Boolean(localDB.coberturas[`${postoId}-${data}`]); }

        function getResumoPosto(posto, dataRef) {
            const ags = localDB.equipe.filter(e => e.posto_id === posto.id);
            const servicoNoPosto = ags.filter(a => {
                const sigla = localDB.ocorrencias[`${a.id}-${dataRef}`] || (isTrabalho(dataRef, a.inicio, a.escala) ? 'T' : 'FO');
                return ['T', 'HI', 'C', 'FG'].includes(sigla);
            });
            const coberturaAtiva = possuiCoberturaAtiva(posto.id, dataRef);
            const total = servicoNoPosto.length + (coberturaAtiva ? 1 : 0);
            return { total, temMinimo: total >= (posto.minimo || 1), servicoNoPosto, coberturaAtiva };
        }

        // --- INTEGRAÇÃO SUPABASE (NÃO ALTERADA) ---
        async function sync() {
            try {
                const [p, e, o, c] = await Promise.all([
                    _supabase.from('postos').select('*').order('nome'),
                    _supabase.from('equipe').select('*').order('nome'),
                    _supabase.from('ocorrencias').select('*'),
                    _supabase.from('coberturas').select('*')
                ]);
                localDB.postos = p.data || [];
                localDB.equipe = e.data || [];
                localDB.ocorrencias = {};
                localDB.coberturas = {};
                o.data?.forEach(occ => localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla);
                c.data?.forEach(cob => localDB.coberturas[`${cob.posto_id}-${cob.data}`] = cob.nome);
                renderAll();
            } catch (err) { notificar("Erro ao sincronizar dados", "error"); }
        }

        // --- GESTÃO DE COBERTURA (UX IMPROVED) ---
        function definirCobertura(postoId) {
            const dataIso = formatarDataISO(dataSelecionada);
            coberturaContexto = { postoId, dataIso };
            document.getElementById('cob-nome').value = localDB.coberturas[`${postoId}-${dataIso}`] || '';
            document.getElementById('modal-cobertura').style.display = 'block';
        }

        async function salvarCoberturaVisual() {
            const nome = document.getElementById('cob-nome').value.trim();
            if(!nome) return notificar("Digite um nome", "error");
            try {
                await _supabase.from('coberturas').upsert({ posto_id: coberturaContexto.postoId, data: coberturaContexto.dataIso, nome });
                closeCoberturaModal(); await sync();
            } catch(e) { notificar("Erro ao salvar", "error"); }
        }

        async function removerCoberturaVisual() {
            try {
                await _supabase.from('coberturas').delete().match({ posto_id: coberturaContexto.postoId, data: coberturaContexto.dataIso });
                closeCoberturaModal(); await sync();
            } catch(e) { notificar("Erro ao remover", "error"); }
        }

        // --- GESTÃO DE SIGLAS (UX IMPROVED) ---
        const SIGLAS_MAP = [
            {s:'T', n:'Trabalho', c:'var(--cor-t)'}, {s:'FO', n:'Folga', c:'var(--cor-fo)'},
            {s:'F', n:'Falta', c:'var(--cor-f)'}, {s:'SU', n:'Suspensão', c:'var(--cor-su)'},
            {s:'AT', n:'Atestado', c:'var(--cor-at)'}, {s:'FE', n:'Férias', c:'var(--cor-fe)'},
            {s:'HI', n:'Hora Extra', c:'var(--cor-hi)'}, {s:'FG', n:'Folguista', c:'var(--cor-fg)'},
            {s:'C', n:'Cobertura', c:'var(--cor-c)'}, {s:'AF', n:'Afastamento', c:'var(--cor-af)'},
            {s:'TC', n:'Curso', c:'var(--cor-tc)'}
        ];

        function setSiglaVertical(agenteId, data, postoId) {
            siglaContexto = { agenteId, data, postoId };
            const container = document.getElementById('sigla-buttons-container');
            container.innerHTML = '';
            
            document.getElementById('sigla-info').innerText = `Agente ID: ${agenteId} | Data: ${data}`;

            SIGLAS_MAP.forEach(item => {
                const b = document.createElement('button');
                b.className = 'sigla-btn';
                b.style.backgroundColor = item.c;
                b.innerText = `${item.s} - ${item.n}`;
                b.onclick = () => aplicarSigla(item.s);
                container.appendChild(b);
            });

            const limpar = document.createElement('button');
            limpar.className = 'sigla-btn';
            limpar.style.backgroundColor = '#333';
            limpar.innerText = "Limpar";
            limpar.onclick = () => aplicarSigla('L');
            container.appendChild(limpar);

            document.getElementById('modal-sigla').style.display = 'block';
        }

        async function aplicarSigla(sigla) {
            try {
                if (sigla === 'L') await _supabase.from('ocorrencias').delete().match({ agente_id: siglaContexto.agenteId, data: siglaContexto.data });
                else await _supabase.from('ocorrencias').upsert({ agente_id: siglaContexto.agenteId, data: siglaContexto.data, sigla });
                closeSiglaModal(); await sync(); openEscala(siglaContexto.postoId);
            } catch(e) { notificar("Erro ao salvar sigla", "error"); }
        }

        // --- RENDERIZAÇÃO ---
        function renderGerencial() {
            const hoje = formatarDataISO(dataSelecionada);
            const postoFiltro = document.getElementById('filtro-posto-gerencial').value;
            const ocorrenciaFiltro = document.getElementById('filtro-ocorrencia-gerencial').value;

            let f=0, su=0, at=0, ausencias = '', coberturas = '';

            localDB.postos.filter(p => !postoFiltro || p.id === postoFiltro).forEach(p => {
                const cob = localDB.coberturas[`${p.id}-${hoje}`];
                if (cob) coberturas += `<div style="margin-bottom:5px">📍 ${p.nome}: <b>${cob}</b></div>`;
            });

            localDB.equipe.forEach(ag => {
                const s = localDB.ocorrencias[`${ag.id}-${hoje}`];
                if (s === 'F') f++; if (s === 'SU') su++; if (s === 'AT') at++;
                if (['F', 'SU', 'AT', 'FE'].includes(s) && (!ocorrenciaFiltro || s === ocorrenciaFiltro)) {
                    ausencias += `<div>[${s}] <b>${ag.nome}</b></div>`;
                }
            });

            document.getElementById('stat-postos').innerText = localDB.postos.length;
            document.getElementById('stat-agentes').innerText = localDB.equipe.length;
            document.getElementById('stat-faltas').innerText = f;
            document.getElementById('stat-suspensoes').innerText = su;
            document.getElementById('stat-atestados').innerText = at;
            document.getElementById('lista-ausencias-gerencial').innerHTML = ausencias || '<small>Sem ausências</small>';
            document.getElementById('lista-coberturas-gerencial').innerHTML = coberturas || '<small>Sem coberturas</small>';
            
            document.getElementById('lista-unidades-gestao').innerHTML = localDB.postos.map(p => {
                const r = getResumoPosto(p, hoje);
                return `• ${r.temMinimo ? '✅' : '⚠️'} ${p.nome} (${r.total}/${p.minimo || 1})`;
            }).join('<br>');
        }

        function renderAll() {
            const hoje = formatarDataISO(dataSelecionada);
            renderGerencial();

            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            localDB.postos.forEach(p => {
                const r = getResumoPosto(p, hoje);
                const cobNome = localDB.coberturas[`${p.id}-${hoje}`] || '';
                const div = document.createElement('div');
                div.className = `card ${r.total > 0 ? 'active-status' : ''} ${r.coberturaAtiva ? 'cobertura-ativa' : ''}`;
                div.innerHTML = `
                    <h3 style="font-size:1rem">${p.nome}</h3>
                    <p style="font-size:0.8rem; margin:5px 0; color:${r.temMinimo ? 'var(--accent)' : 'var(--danger)'}">${r.temMinimo ? '🟢 OPERACIONAL' : '⚠️ INSUFICIENTE'}</p>
                    <div class="card-count">${r.total}/${p.minimo || 1}</div>
                    ${r.coberturaAtiva ? `<div style="font-size:0.75rem; color:var(--info)">Cob: ${cobNome}</div>` : ''}
                    <button onclick="event.stopPropagation(); definirCobertura('${p.id}')" style="margin-top:10px; font-size:0.7rem; background:none; border:1px solid #444; color:#aaa; padding:4px 8px; border-radius:4px; cursor:pointer">Cobertura</button>
                `;
                div.onclick = () => openEscala(p.id);
                container.appendChild(div);
            });

            // Atualizar Selects
            const selectPostos = localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('func-posto-select').innerHTML = '<option value="">Selecione Posto...</option>' + selectPostos;
            document.getElementById('filtro-posto-gerencial').innerHTML = '<option value="">Todas Unidades</option>' + selectPostos;

            // Listas de Cadastro
            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => `<div class="list-item"><span>${p.nome} (${p.minimo} mín)</span><button class="btn-remove material-icons" onclick="removePosto('${p.id}')">delete</button></div>`).join('');
            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => `<div class="list-item"><span>${e.nome} - ${e.escala}</span><button class="btn-remove material-icons" onclick="removeAgente('${e.id}')">delete</button></div>`).join('');
        }

        function openEscala(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            if (!posto) return;
            document.getElementById('modal-titulo').innerText = `Escala: ${posto.nome}`;
            const ano = dataSelecionada.getFullYear(), mes = dataSelecionada.getMonth() + 1;
            const diasMes = new Date(ano, mes, 0).getDate();
            const agentes = localDB.equipe.filter(e => e.posto_id === postoId);

            let html = agentes.length ? '' : '<p style="padding:20px; color:var(--text-secondary)">Nenhum agente vinculado.</p>';
            agentes.forEach(ag => {
                html += `<div style="margin-bottom:20px">
                    <div style="font-weight:bold; margin-bottom:5px; color:var(--accent)">${ag.nome} (${ag.escala})</div>
                    <div class="escala-row">${Array.from({length:diasMes}, (_, i) => `<div class="dia-cell">${i+1}</div>`).join('')}</div>
                    <div class="escala-row">${Array.from({length:diasMes}, (_, i) => {
                        const dStr = `${ano}-${String(mes).padStart(2, '0')}-${String(i+1).padStart(2, '0')}`;
                        const s = localDB.ocorrencias[`${ag.id}-${dStr}`] || (isTrabalho(dStr, ag.inicio, ag.escala) ? 'T' : 'FO');
                        return `<div class="sigla-cell sigla-${s}" onclick="setSiglaVertical('${ag.id}', '${dStr}', '${postoId}')">${s}</div>`;
                    }).join('')}</div>
                </div>`;
            });
            document.getElementById('escala-content').innerHTML = html;
            document.getElementById('modal-escala').style.display = 'block';
        }

        // --- CRUD BÁSICO COM VALIDAÇÃO ---
        async function addPosto() {
            const nome = document.getElementById('posto-nome').value.trim();
            const min = document.getElementById('posto-minimo').value;
            if(!nome || !min) return notificar("Preencha todos os campos", "error");
            try {
                await _supabase.from('postos').insert([{ nome, minimo: parseInt(min) }]);
                document.getElementById('posto-nome').value = ''; sync();
            } catch(e) { notificar("Erro ao criar posto", "error"); }
        }

        async function addAgente() {
            const nome = document.getElementById('func-nome').value.trim();
            const p = document.getElementById('func-posto-select').value;
            const e = document.getElementById('func-escala').value;
            const i = document.getElementById('func-inicio').value;
            if(!nome || !p || !i) return notificar("Preencha todos os campos", "error");
            try {
                await _supabase.from('equipe').insert([{ nome, posto_id: p, escala: e, inicio: i }]);
                document.getElementById('func-nome').value = ''; sync();
            } catch(e) { notificar("Erro ao cadastrar agente", "error"); }
        }

        async function removePosto(id) { if(confirm("Excluir esta unidade?")) await _supabase.from('postos').delete().eq('id', id).then(sync); }
        async function removeAgente(id) { if(confirm("Remover este agente?")) await _supabase.from('equipe').delete().eq('id', id).then(sync); }

        // --- HELPERS UI ---
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
        }
        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        function closeSiglaModal() { document.getElementById('modal-sigla').style.display = 'none'; }
        function closeCoberturaModal() { document.getElementById('modal-cobertura').style.display = 'none'; }

        window.onload = () => { atualizarDataDisplay(); sync(); };
        window.onclick = (e) => { if (e.target.className === 'modal') { closeModal(); closeSiglaModal(); closeCoberturaModal(); } };
    </script>
</body>
</html>
