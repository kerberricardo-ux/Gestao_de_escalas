<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a; --bg-card: #161616; --accent: #00e676;
            --text-primary: #ffffff; --text-secondary: #a0a0a0;
            --danger: #ef4444; --border: #222;
            --cor-t: #22c55e; --cor-fo: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); display: flex; }
        .sidebar { width: 220px; background: #000; height: 100vh; position: fixed; border-right: 1px solid var(--border); padding: 20px; }
        .sidebar h1 { color: var(--accent); font-size: 1.2rem; margin-bottom: 30px; text-align: center; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 8px; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active { background: rgba(0, 230, 118, 0.1); color: var(--accent); }
        .main { margin-left: 220px; padding: 30px; width: 100%; }
        section { display: none; } section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 12px; border-left: 6px solid var(--danger); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.active-status { border-left-color: var(--accent); }
        .form-group { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; border: 1px solid var(--border); }
        input, select { background: #222; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 4px; flex: 1; }
        .btn { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; font-size: 0.8rem; min-width: 40px; }
        th { background: #000; color: var(--accent); }
        .cell-T { background: var(--cor-t); color: white; font-weight: bold; }
        .cell-FO { background: var(--cor-fo); color: #555; }
        .cell-F, .cell-SU { background: var(--danger); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
        .modal-content { background: var(--bg-card); width: 95%; margin: 2% auto; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h1>SENTINELA</h1>
        <button onclick="showSection('dashboard')" id="nav-dash" class="active"><span class="material-icons">dashboard</span> Dashboard</button>
        <button onclick="showSection('postos')" id="nav-postos"><span class="material-icons">business</span> Postos</button>
        <button onclick="showSection('equipe')" id="nav-equipe"><span class="material-icons">groups</span> Equipe</button>
    </nav>

    <div class="main">
        <section id="dashboard" class="active">
            <h2 id="current-date" style="margin-bottom: 25px;"></h2>
            <div id="cards-container" class="grid"></div>
        </section>

        <section id="postos">
            <h2>Gerenciar Unidades</h2>
            <div class="form-group">
                <input type="text" id="posto-nome" placeholder="Nome do Posto (Ex: Condomínio X)">
                <button class="btn" onclick="addPosto()">Criar Posto</button>
            </div>
            <div id="lista-postos"></div>
        </section>

        <section id="equipe">
            <h2>Gerenciar Agentes</h2>
            <div class="form-group">
                <input type="text" id="func-nome" placeholder="Nome Completo">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="2x1">2x1</option>
                    <option value="5x1">5x1 (Comercial)</option>
                </select>
                <input type="date" id="func-inicio">
                <button class="btn" onclick="addAgente()">Cadastrar</button>
            </div>
            <div id="lista-equipe"></div>
        </section>
    </div>

    <div id="modal-escala" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo" style="color: var(--accent); margin-bottom: 15px;"></h3>
            <div style="overflow-x: auto; max-height: 70vh;">
                <table>
                    <thead><tr id="table-header"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <button class="btn" onclick="closeModal()" style="margin-top: 20px;">Fechar Janela</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE CONECTADA AO PROJETO ATUAL
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co'; 
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {} };

        async function sync() {
            try {
                const { data: p } = await _supabase.from('postos').select('*');
                const { data: e } = await _supabase.from('equipe').select('*');
                const { data: o } = await _supabase.from('ocorrencias').select('*');
                
                localDB.postos = p || [];
                localDB.equipe = e || [];
                localDB.ocorrencias = {};
                o?.forEach(occ => localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla);
                
                renderAll();
            } catch (err) { console.error("Erro na conexão:", err); }
        }

        function isTrabalho(data, inicio, escala) {
            const dI = new Date(inicio + 'T00:00:00');
            const dA = new Date(data + 'T00:00:00');
            const diff = Math.floor((dA - dI) / 86400000);
            if (diff < 0) return false;
            if (escala === '12x36') return diff % 2 === 0;
            if (escala === '2x1') return diff % 3 < 2;
            if (escala === '5x1') return diff % 6 < 5;
            return false;
        }

        async function addPosto() {
            const nome = document.getElementById('posto-nome').value;
            if (!nome) return;
            const { error } = await _supabase.from('postos').insert([{ nome }]);
            if (error) alert("Erro ao salvar: Verifique o CORS no Supabase.");
            else { document.getElementById('posto-nome').value = ''; sync(); }
        }

        async function addAgente() {
            const nome = document.getElementById('func-nome').value;
            const posto_id = document.getElementById('func-posto-select').value;
            const escala = document.getElementById('func-escala').value;
            const inicio = document.getElementById('func-inicio').value;
            if (!nome || !posto_id || !inicio) return alert("Preencha todos os dados");
            await _supabase.from('equipe').insert([{ nome, posto_id, escala, inicio }]);
            sync();
        }

        async function setSigla(agenteId, data, postoId) {
            const s = prompt("SIGLA (T, FO, F, SU, HI, C, L para Limpar):").toUpperCase();
            if (!s) return;
            if (s === 'L') await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
            else await _supabase.from('ocorrencias').upsert({ agente_id: agenteId, data, sigla: s });
            await sync();
            openEscala(postoId);
        }

        function renderAll() {
            const hoje = new Date().toISOString().split('T')[0];
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            localDB.postos.forEach(p => {
                const agentes = localDB.equipe.filter(e => e.posto_id === p.id);
                const emServico = agentes.filter(a => {
                    const status = localDB.ocorrencias[`${a.id}-${hoje}`] || (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    return ['T', 'HI', 'C'].includes(status) && !['F', 'SU', 'FO'].includes(status);
                });

                const card = document.createElement('div');
                card.className = `card ${emServico.length > 0 ? 'active-status' : ''}`;
                card.innerHTML = `<h3>${p.nome}</h3><p>${emServico.length > 0 ? '🟢 OPERACIONAL' : '🔴 VAGO'}</p><small>${emServico.length} Agentes em serviço</small>`;
                card.onclick = () => openEscala(p.id);
                container.appendChild(card);
            });

            document.getElementById('func-posto-select').innerHTML = '<option value="">Selecione o Posto...</option>' + localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => `<div class="form-group">📍 ${p.nome}</div>`).join('');
            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => `<div class="form-group">👤 ${e.nome} (${e.escala})</div>`).join('');
        }

        function openEscala(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            document.getElementById('modal-titulo').innerText = "Escala Mensal: " + posto.nome;
            const agora = new Date();
            const diasMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
            document.getElementById('table-header').innerHTML = '<th>Agente</th>' + Array.from({length: diasMes}, (_, i) => `<th>${i+1}</th>`).join('');
            document.getElementById('table-body').innerHTML = localDB.equipe.filter(e => e.posto_id === postoId).map(a => {
                let r = `<tr><td style="text-align:left; background: #000;"><b>${a.nome}</b></td>`;
                for(let d=1; d<=diasMes; d++) {
                    const dt = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const s = localDB.ocorrencias[`${a.id}-${dt}`] || (isTrabalho(dt, a.inicio, a.escala) ? 'T' : 'FO');
                    r += `<td class="cell-${s}" onclick="setSigla('${a.id}', '${dt}', '${postoId}')" style="cursor:pointer">${s}</td>`;
                }
                return r + '</tr>';
            }).join('');
            document.getElementById('modal-escala').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        function showSection(id) { 
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + (id==='dashboard'?'dash':id)).classList.add('active');
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
            sync();
        }
    </script>
</body>
</html>
