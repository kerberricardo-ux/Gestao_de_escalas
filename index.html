<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Escalas - Operacional</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ef4444;  /* F */
            --warning: #f97316; /* C / SU */
            --info: #3b82f6;    /* FE */
            --border: #333;
            --cor-t: #22c55e;     
            --cor-fo: #000000;    
            --text-fo: #ffffff;   
            --cor-at: #06b6d4;    
            --cor-tc: #374151;    
            --cor-af: #8b5cf6;    
            --cor-fg: #84cc16;    
            --cor-hi: #16a34a;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); display: flex; min-height: 100vh; }

        .sidebar { width: 220px; background: #000; padding: 20px; position: fixed; height: 100vh; border-right: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active-nav { background: rgba(0, 230, 118, 0.1); color: var(--accent); }

        .content { margin-left: 220px; padding: 30px; width: calc(100% - 220px); }
        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 6px solid var(--danger); cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card.active-status { border-left-color: var(--accent); }
        .card h3 { margin-bottom: 10px; }
        .efetivo-count { font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px; }

        .form-container { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { background: #2c2c2c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; }
        
        .list-item { background: var(--bg-card); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--bg-card); margin: 2% auto; padding: 25px; width: 95%; max-height: 90vh; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .table-responsive { overflow: auto; flex-grow: 1; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; font-size: 0.85rem; }

        .cell-T { background: var(--cor-t) !important; color: white; }
        .cell-FO { background: var(--cor-fo) !important; color: var(--text-fo) !important; }
        .cell-F { background: var(--danger) !important; color: white; }
        .cell-HI { background: var(--cor-hi) !important; color: white; }
        .cell-C { background: var(--warning) !important; color: white; }
        .cell-SU { background: #ea580c !important; color: white; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">GESTÃO DE ESCALAS</div>
        <button onclick="showSection('dashboard')" id="nav-dashboard"><span class="material-icons">dashboard</span> <span>Dashboard</span></button>
        <button onclick="showSection('postos')" id="nav-postos"><span class="material-icons">business</span> <span>Postos</span></button>
        <button onclick="showSection('equipe')" id="nav-equipe"><span class="material-icons">groups</span> <span>Equipe</span></button>
    </nav>

    <main class="content">
        <section id="dashboard" class="active">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Painel Operacional (Tempo Real)</h2>
                <div id="current-date" style="font-weight: bold; color: var(--accent);"></div>
            </header>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <section id="postos">
            <h2>Gestão de Postos</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome da Unidade/Posto">
                <button class="btn-add" onclick="addPosto()">Criar Posto</button>
            </div>
            <div id="lista-postos" class="list-container"></div>
        </section>

        <section id="equipe">
            <h2>Gestão de Efetivo</h2>
            <div class="form-container">
                <input type="hidden" id="edit-func-id">
                <input type="text" id="func-nome" placeholder="Nome do Agente">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="5x1">5x1</option>
                    <option value="6x1">6x1</option>
                    <option value="4x2">4x2</option>
                </select>
                <input type="date" id="func-inicio">
                <button class="btn-add" id="btn-salvar-func" onclick="saveFuncionario()">Cadastrar</button>
            </div>
            <div id="lista-equipe" class="list-container"></div>
        </section>

        <div id="modal-escala" class="modal">
            <div class="modal-content">
                <span class="close" style="cursor:pointer; text-align:right; font-size:2rem" onclick="closeModal()">&times;</span>
                <h3 id="modal-titulo"></h3>
                <div class="table-responsive">
                    <table>
                        <thead><tr id="table-header"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('guardianDB')) || { postos: [], equipe: [], ocorrencias: {} };

        function saveDB() {
            localStorage.setItem('guardianDB', JSON.stringify(db));
            renderAll();
        }

        // --- Lógica de Status em Tempo Real ---
        
        function getStatusNoDia(agente, dataStr) {
            // 1. Verifica se tem alteração manual (Ocorrência)
            const ocorrencia = db.ocorrencias[`${agente.id}-${dataStr}`];
            if (ocorrencia) return ocorrencia;

            // 2. Se não tem ocorrência, calcula pela escala base
            return isTrabalhoBase(dataStr, agente.inicio, agente.escala) ? 'T' : 'FO';
        }

        function isTrabalhoBase(data, dataInicio, escala) {
            const dInicio = new Date(dataInicio + 'T00:00:00');
            const dAtual = new Date(data + 'T00:00:00');
            const diffDays = Math.floor((dAtual - dInicio) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return false;
            switch(escala) {
                case '12x36': return diffDays % 2 === 0;
                case '5x1': return diffDays % 6 < 5;
                case '6x1': return diffDays % 7 < 6;
                case '4x2': return diffDays % 6 < 4;
                default: return false;
            }
        }

        function renderDashboard() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            const hoje = new Date().toISOString().split('T')[0];

            db.postos.forEach(posto => {
                const agentesDoPosto = db.equipe.filter(e => e.postoId === posto.id);
                
                // Filtra quem realmente está trabalhando hoje (T, HI, C ou FG) 
                // e remove quem tem falta (F), Suspenso (SU), Atestado (AT), etc.
                const emServicoAgora = agentesDoPosto.filter(agente => {
                    const status = getStatusNoDia(agente, hoje);
                    const siglasTrabalho = ['T', 'HI', 'C', 'FG'];
                    const siglasAusencia = ['F', 'SU', 'AT', 'FE', 'AF', 'TC'];
                    
                    return siglasTrabalho.includes(status) && !siglasAusencia.includes(status);
                });

                const temAlguem = emServicoAgora.length > 0;
                const card = document.createElement('div');
                card.className = `card ${temAlguem ? 'active-status' : ''}`;
                
                card.innerHTML = `
                    <h3>${posto.nome}</h3>
                    <p>${temAlguem ? '🟢 EM SERVIÇO' : '🔴 SEM EFETIVO'}</p>
                    <div class="efetivo-count">
                        <strong>${emServicoAgora.length}</strong> de ${agentesDoPosto.length} agentes ativos
                    </div>
                `;
                card.onclick = () => openEscala(posto.id);
                container.appendChild(card);
            });
        }

        // --- Funções de Interface ---

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addPosto() {
            const nome = document.getElementById('posto-nome').value;
            if (!nome) return;
            db.postos.push({ id: Date.now(), nome });
            document.getElementById('posto-nome').value = '';
            saveDB();
        }

        function saveFuncionario() {
            const nome = document.getElementById('func-nome').value;
            const postoId = Number(document.getElementById('func-posto-select').value);
            const escala = document.getElementById('func-escala').value;
            const inicio = document.getElementById('func-inicio').value;
            if (!nome || !inicio || !postoId) return alert("Preencha tudo");
            db.equipe.push({ id: Date.now(), nome, postoId, escala, inicio });
            saveDB();
        }

        function openEscala(postoId) {
            const modal = document.getElementById('modal-escala');
            const header = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            const posto = db.postos.find(p => p.id === postoId);
            const agora = new Date();
            const diasNoMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
            
            document.getElementById('modal-titulo').innerText = `Escala: ${posto.nome}`;
            header.innerHTML = '<th>AGENTE</th>' + Array.from({length: diasNoMes}, (_, i) => `<th>${i+1}</th>`).join('');

            body.innerHTML = db.equipe.filter(e => e.postoId === postoId).map(f => {
                let row = `<tr><td style="text-align:left"><b>${f.nome}</b></td>`;
                for(let d=1; d<=diasNoMes; d++) {
                    const dataStr = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const status = getStatusNoDia(f, dataStr);
                    row += `<td class="cell-${status}" onclick="setOcorrencia('${f.id}', '${dataStr}')" style="cursor:pointer">${status}</td>`;
                }
                return row + '</tr>';
            }).join('');
            modal.style.display = 'block';
        }

        function setOcorrencia(funcId, data) {
            const op = prompt("(T) Trabalho, (FO) Folga, (F) Falta, (C) Cobertura, (HI) Extra, (AT) Atestado, (SU) Suspenso, (L) Limpar");
            if(!op) return;
            const res = op.toUpperCase();
            if (res === 'L') delete db.ocorrencias[`${funcId}-${data}`];
            else db.ocorrencias[`${funcId}-${data}`] = res;
            saveDB();
            closeModal();
        }

        function renderPostosList() {
            document.getElementById('lista-postos').innerHTML = db.postos.map(p => `<div class="list-item">${p.nome}</div>`).join('');
        }

        function updateSelects() {
            const select = document.getElementById('func-posto-select');
            select.innerHTML = '<option value="">Selecione o Posto...</option>' + db.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        }

        function renderEquipeList() {
            document.getElementById('lista-equipe').innerHTML = db.equipe.map(e => `<div class="list-item">${e.nome} (${e.escala})</div>`).join('');
        }

        function renderAll() {
            renderDashboard();
            renderPostosList();
            renderEquipeList();
            updateSelects();
        }

        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
            renderAll();
        });
    </script>
</body>
</html>
