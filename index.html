<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas Operacionais</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ef4444;  
            --warning: #f97316; 
            --info: #3b82f6;    
            --border: #333;
            --cor-t: #22c55e;     
            --cor-fo: #000000;    
            --cor-f: #ef4444;     
            --cor-su: #ea580c;    
            --cor-at: #06b6d4;    
            --cor-fe: #3b82f6;    
            --cor-hi: #16a34a;    
            --cor-fg: #84cc16;    
            --cor-c: #f97316;     
            --cor-af: #8b5cf6;    
            --cor-tc: #374151;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); display: flex; min-height: 100vh; }

        .sidebar { width: 220px; background: #000; padding: 20px; position: fixed; height: 100vh; border-right: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active-nav { background: rgba(0, 230, 118, 0.1); color: var(--accent); }

        .content { margin-left: 220px; padding: 30px; width: calc(100% - 220px); }
        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; }
        .stat-card.alert { border-bottom-color: var(--danger); }
        .filter-select { background: #2c2c2c; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; outline: none; }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 12px; 
            border-left: 6px solid var(--danger); 
            cursor: pointer; 
            transition: 0.2s; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }
        
        .card.minimo-insuficiente {
            border-left-color: var(--warning) !important;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            animation: pulse-warning 2s infinite;
        }
        
        @keyframes pulse-warning {
            0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.6); }
        }
        
        .card.active-status { border-left-color: var(--accent); }
        
        .card-count { 
            position: absolute; 
            bottom: 12px; 
            right: 12px; 
            padding: 4px 12px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 800;
            border: 1px solid rgba(0, 230, 118, 0.3);
            text-transform: uppercase;
        }
        
        .card-count.minimo-alerta {
            background: rgba(249, 115, 22, 0.2);
            color: var(--warning);
            border-color: rgba(249, 115, 22, 0.5);
            font-size: 0.8rem;
        }

        .form-container { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { background: #2c2c2c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add, .btn-edit, .btn-save, .btn-cancel { 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 0 5px;
        }
        .btn-edit, .btn-save { background: var(--info); }
        .btn-cancel { background: var(--warning); color: white; }
        .btn-remove { background: var(--danger); color: white; }

        .list-item { background: var(--bg-card); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* MODAL PARA EDIÇÃO DE AGENTE */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { 
            background: var(--bg-card); 
            margin: 2% auto; 
            padding: 20px; 
            width: 95%; 
            max-width: 1400px; 
            max-height: 95vh; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        
        /* TÍTULO DO MODAL ESCALA OTIMIZADO */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .modal-edit-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }

        /* TABELA ESCALA OTIMIZADA PARA MODAL */
        .table-responsive { 
            flex: 1; 
            overflow: auto; 
            border: 1px solid var(--border); 
            border-radius: 6px;
            max-height: 70vh;
        }
        
        /* TABELA COM LAYOUT FIXO E RESPONSIVO */
        #tabela-escala {
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed;
            min-width: 0; /* Remove min-width fixo */
        }
        
        /* CABEÇALHO FIXO */
        #tabela-escala th { 
            background: #111; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border: 1px solid var(--border); 
            padding: 6px 4px; /* Padding reduzido */
            font-size: 0.75rem; /* Font-size menor */
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* CÉLULAS OTIMIZADAS */
        #tabela-escala td { 
            border: 1px solid var(--border); 
            padding: 4px 2px; /* Padding bem reduzido */
            text-align: center; 
            font-size: 0.7rem; /* Font-size ainda menor */
            font-weight: 600;
            height: 32px; /* Altura fixa para uniformidade */
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            position: relative;
        }
        
        /* NOME DO AGENTE (PRIMEIRA COLUNA) */
        #tabela-escala td:first-child {
            text-align: left;
            font-weight: bold;
            padding-left: 8px;
            font-size: 0.8rem;
            position: sticky;
            left: 0;
            background: var(--bg-card);
            z-index: 5;
            min-width: 140px;
            width: 140px;
            max-width: 140px;
        }
        
        /* COLUNAS DE DIAS (LARGURA FIXA) */
        #tabela-escala th:not(:first-child),
        #tabela-escala td:not(:first-child) {
            width: calc((100% - 140px) / 31); /* Divide o espaço restante pelos 31 dias */
            min-width: 28px;
            max-width: 32px;
        }

        /* CORES DAS CÉLULAS */
        .cell-T { background: var(--cor-t) !important; color: white; }
        .cell-FO { background: var(--cor-fo) !important; color: #555; }
        .cell-F { background: var(--cor-f) !important; color: white; }
        .cell-SU { background: var(--cor-su) !important; color: white; }
        .cell-AT { background: var(--cor-at) !important; color: white; }
        .cell-FE { background: var(--cor-fe) !important; color: white; }
        .cell-HI { background: var(--cor-hi) !important; color: white; }
        .cell-FG { background: var(--cor-fg) !important; color: white; font-weight: bold; }
        .cell-C { background: var(--cor-c) !important; color: white; }
        .cell-AF { background: var(--cor-af) !important; color: white; }
        .cell-TC { background: var(--cor-tc) !important; color: white; }

        .close { 
            font-size: 24px; 
            cursor: pointer; 
            color: var(--text-secondary); 
            font-weight: bold;
            line-height: 1;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        
        .close:hover { background: rgba(255,255,255,0.1); }

        /* RESPONSIVIDADE PARA TELAS MENORES */
        @media (max-width: 768px) {
            .content { margin-left: 0; padding: 15px; width: 100%; }
            .sidebar { transform: translateX(-100%); }
            #tabela-escala td:first-child { min-width: 120px; width: 120px; font-size: 0.75rem; }
            #tabela-escala th:not(:first-child),
            #tabela-escala td:not(:first-child) { width: calc((100% - 120px) / 31); min-width: 24px; }
            #tabela-escala td { padding: 2px 1px; font-size: 0.65rem; height: 28px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SENTINELA GESTÃO DE ESCALAS</div>
        <button onclick="showSection('dashboard_gerencial')" id="nav-dashboard_gerencial" class="active-nav">
            <span class="material-icons">analytics</span> <span>Gerencial</span>
        </button>
        <button onclick="showSection('dashboard')" id="nav-dashboard">
            <span class="material-icons">monitor_heart</span> <span>Tempo Real</span>
        </button>
        <button onclick="showSection('postos')" id="nav-postos">
            <span class="material-icons">business</span> <span>Postos</span>
        </button>
        <button onclick="showSection('equipe')" id="nav-equipe">
            <span class="material-icons">groups</span> <span>Equipe</span>
        </button>
    </nav>

    <main class="content">
        <section id="dashboard_gerencial" class="active">
            <div class="stats-header">
                <h2>Resumo Gerencial</h2>
                <select id="filtro-periodo" class="filter-select" onchange="renderAll()">
                    <option value="dia">Hoje</option>
                    <option value="mes">Mês Atual</option>
                </select>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3>Postos Ativos</h3><div class="value" id="stat-postos">0</div></div>
                <div class="stat-card"><h3>Efetivo Total</h3><div class="value" id="stat-agentes">0</div></div>
                <div class="stat-card alert"><h3>Faltas</h3><div class="value" id="stat-faltas">0</div></div>
                <div class="stat-card alert"><h3>Suspensões</h3><div class="value" id="stat-suspensoes">0</div></div>
                <div class="stat-card"><h3>Atestados</h3><div class="value" id="stat-atestados">0</div></div>
            </div>
            <div class="grid-cards">
                <div class="stat-card" style="text-align: left; grid-column: span 2; border-bottom: none;">
                    <h3 style="margin-bottom: 15px;"><span class="material-icons" style="vertical-align: middle;">list</span> Lista de Unidades</h3>
                    <div id="lista-unidades-gestao" style="font-size: 0.9rem; line-height: 1.8; color: var(--text-secondary);"></div>
                </div>
            </div>
        </section>

        <section id="dashboard">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Painel Operacional (Hoje)</h2>
                <div id="current-date" style="font-weight: bold; color: var(--accent);"></div>
            </header>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <section id="postos">
            <h2>Gestão de Unidades</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome da Unidade">
                <input type="number" id="posto-minimo" placeholder="Mínimo" min="1" max="50" style="min-width: 100px;">
                <button class="btn-add" onclick="addPosto()">Criar Posto</button>
            </div>
            <div id="lista-postos"></div>
        </section>

        <section id="equipe">
            <h2>Gestão de Agentes</h2>
            <div class="form-container">
                <input type="text" id="func-nome" placeholder="Nome Completo">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="2x1">2x1</option>
                    <option value="5x1">5x1</option>
                    <option value="6x1">6x1</option>
                    <option value="4x2">4x2</option>
                </select>
                <input type="date" id="func-inicio" title="Data de Início do Ciclo">
                <button class="btn-add" onclick="addAgente()">Cadastrar</button>
            </div>
            <div id="lista-equipe"></div>
        </section>

        <!-- MODAL ESCALA OTIMIZADO -->
        <div id="modal-escala" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-titulo" style="margin: 0;">Escala</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="table-responsive">
                    <table id="tabela-escala">
                        <thead><tr id="table-header"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- MODAL EDIÇÃO AGENTE -->
        <div id="modal-edit-agente" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-edit-titulo">Editar Agente</h3>
                    <span class="close" onclick="closeEditModal()">&times;</span>
                </div>
                <form class="modal-edit-form" id="form-edit-agente">
                    <input type="hidden" id="edit-agente-id">
                    <input type="text" id="edit-agente-nome" placeholder="Nome Completo" required>
                    <select id="edit-agente-posto" required>
                        <option value="">Selecione o Posto...</option>
                    </select>
                    <select id="edit-agente-escala" required>
                        <option value="12x36">12x36</option>
                        <option value="2x1">2x1</option>
                        <option value="5x1">5x1</option>
                        <option value="6x1">6x1</option>
                        <option value="4x2">4x2</option>
                    </select>
                    <input type="date" id="edit-agente-inicio" required>
                </form>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
                    <button type="button" class="btn-save" onclick="saveEditAgente()">Salvar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co'; 
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {} };
        let agenteEditando = null;

        async function sync() {
            try {
                const { data: p } = await _supabase.from('postos').select('*').order('nome');
                const { data: e } = await _supabase.from('equipe').select('*').order('nome');
                const { data: o } = await _supabase.from('ocorrencias').select('*');
                localDB.postos = p || [];
                localDB.equipe = e || [];
                localDB.ocorrencias = {};
                o?.forEach(occ => localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla);
                renderAll();
            } catch (err) { console.error(err); }
        }

        function isTrabalho(data, inicio, escala) {
            const dI = new Date(inicio + 'T00:00:00');
            const dA = new Date(data + 'T00:00:00');
            const diff = Math.floor((dA - dI) / 86400000);
            if (diff < 0) return false;
            switch(escala) {
                case '12x36': return diff % 2 === 0;
                case '2x1': return diff % 3 < 2;
                case '5x1': return diff % 6 < 5;
                case '6x1': return diff % 7 < 6;
                case '4x2': return diff % 6 < 4;
                default: return false;
            }
        }

        async function addPosto() {
            const n = document.getElementById('posto-nome').value;
            const m = parseInt(document.getElementById('posto-minimo').value) || 1;
            if (!n) return alert("Digite o nome do posto");
            if (m < 1 || m > 50) return alert("Mínimo deve ser entre 1 e 50");
            
            await _supabase.from('postos').insert([{ nome: n, minimo: m }]);
            document.getElementById('posto-nome').value = '';
            document.getElementById('posto-minimo').value = '';
            sync();
        }

        async function editMinimo(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            const novoMinimo = prompt(`Mínimo atual: ${posto.minimo}\\nDigite novo mínimo (1-50):`, posto.minimo);
            const m = parseInt(novoMinimo);
            if (isNaN(m) || m < 1 || m > 50) return alert("Mínimo inválido (1-50)");
            
            await _supabase.from('postos').update({ minimo: m }).eq('id', postoId);
            sync();
        }

        async function removePosto(id) {
            if(confirm("Excluir posto?")) { 
                await _supabase.from('postos').delete().eq('id', id); 
                sync(); 
            }
        }

        async function addAgente() {
            const n = document.getElementById('func-nome').value;
            const p = document.getElementById('func-posto-select').value;
            const e = document.getElementById('func-escala').value;
            const i = document.getElementById('func-inicio').value;
            if (!n || !p || !i) return alert("Preencha todos os campos");
            await _supabase.from('equipe').insert([{ nome: n, posto_id: p, escala: e, inicio: i }]);
            document.getElementById('func-nome').value = '';
            document.getElementById('func-posto-select').value = '';
            document.getElementById('func-inicio').value = '';
            sync();
        }

        function editAgente(id) {
            agenteEditando = localDB.equipe.find(a => a.id === id);
            if (!agenteEditando) return;

            document.getElementById('edit-agente-id').value = agenteEditando.id;
            document.getElementById('edit-agente-nome').value = agenteEditando.nome;
            document.getElementById('edit-agente-posto').value = agenteEditando.posto_id;
            document.getElementById('edit-agente-escala').value = agenteEditando.escala;
            document.getElementById('edit-agente-inicio').value = agenteEditando.inicio;
            document.getElementById('modal-edit-titulo').textContent = `Editando: ${agenteEditando.nome}`;
            
            const postoSelect = document.getElementById('edit-agente-posto');
            postoSelect.innerHTML = '<option value="">Selecione o Posto...</option>' + 
                localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            postoSelect.value = agenteEditando.posto_id;
            
            document.getElementById('modal-edit-agente').style.display = 'block';
        }

        async function saveEditAgente() {
            const id = document.getElementById('edit-agente-id').value;
            const nome = document.getElementById('edit-agente-nome').value;
            const posto_id = document.getElementById('edit-agente-posto').value;
            const escala = document.getElementById('edit-agente-escala').value;
            const inicio = document.getElementById('edit-agente-inicio').value;

            if (!nome || !posto_id || !escala || !inicio) {
                return alert('Preencha todos os campos');
            }

            try {
                await _supabase.from('equipe').update({ 
                    nome, 
                    posto_id, 
                    escala, 
                    inicio 
                }).eq('id', id);

                closeEditModal();
                sync();
                alert('Agente atualizado com sucesso!');
            } catch (error) {
                console.error('Erro ao salvar:', error);
                alert('Erro ao salvar agente');
            }
        }

        function closeEditModal() {
            document.getElementById('modal-edit-agente').style.display = 'none';
            agenteEditando = null;
            document.getElementById('form-edit-agente').reset();
        }

        async function removeAgente(id) {
            if(confirm("Remover agente?")) { 
                await _supabase.from('equipe').delete().eq('id', id); 
                sync(); 
            }
        }

        async function setSigla(agenteId, data, postoId) {
            const mensagem = `DIGITE A SIGLA:\\n\\n` +
                `T  = Trabalho\\n` +
                `FO = Folga\\n` +
                `FG = Folguista\\n` +
                `F  = Falta\\n` +
                `SU = Suspensão\\n` +
                `HI = Hora Extra\\n` +
                `C  = Cobertura\\n` +
                `AT = Atestado\\n` +
                `FE = Férias\\n` +
                `L  = Limpar\\n\\n` +
                `(Pressione Backspace com campo vazio para LIMPAR)`;

            const s = prompt(mensagem)?.toUpperCase().trim();
            
            if (!s || s === '') {
                await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
                await sync();
                openEscala(postoId);
                return;
            }

            if (s === 'L') {
                await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
            } else {
                await _supabase.from('ocorrencias').upsert({ agente_id: agenteId, data, sigla: s });
            }
            
            await sync();
            openEscala(postoId);
        }

        function renderAll() {
            const hoje = new Date().toISOString().split('T')[0];
            
            let totalFaltas = 0, totalSu = 0, totalAt = 0;
            localDB.equipe.forEach(ag => {
                const s = localDB.ocorrencias[`${ag.id}-${hoje}`];
                if (s === 'F') totalFaltas++; 
                if (s === 'SU') totalSu++; 
                if (s === 'AT') totalAt++;
            });

            document.getElementById('stat-postos').innerText = localDB.postos.length;
            document.getElementById('stat-agentes').innerText = localDB.equipe.length;
            document.getElementById('stat-faltas').innerText = totalFaltas;
            document.getElementById('stat-suspensoes').innerText = totalSu;
            document.getElementById('stat-atestados').innerText = totalAt;
            document.getElementById('lista-unidades-gestao').innerHTML = 
                localDB.postos.map(p => `• ${p.nome} (${p.minimo} mín.)`).join('<br>');

            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            localDB.postos.forEach(p => {
                const ags = localDB.equipe.filter(e => e.posto_id === p.id);
                const minimo = p.minimo || 1;
                
                const servicoNoPosto = ags.filter(a => {
                    const siglaAtual = localDB.ocorrencias[`${a.id}-${hoje}`] || 
                        (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    return ['T', 'HI', 'C', 'FG'].includes(siglaAtual);
                });

                const temMinimoSuficiente = servicoNoPosto.length >= minimo;
                const classesCard = [
                    'card',
                    servicoNoPosto.length > 0 ? 'active-status' : '',
                    !temMinimoSuficiente ? 'minimo-insuficiente' : ''
                ].filter(Boolean).join(' ');
                
                const card = document.createElement('div');
                card.className = classesCard;
                
                let statusText = servicoNoPosto.length > 0 ? '🟢 OPERACIONAL' : '🔴 VAGO';
                if (!temMinimoSuficiente) {
                    statusText = `⚠️ ABAIXO DO MÍNIMO (${minimo})`;
                }
                
                card.innerHTML = `
                    <h3>${p.nome}</h3>
                    <p>${statusText}</p>
                    <div class="card-count ${!temMinimoSuficiente ? 'minimo-alerta' : ''}">
                        ${servicoNoPosto.length}/${minimo} EFETIVO
                    </div>
                `;
                
                card.onclick = () => openEscala(p.id);
                container.appendChild(card);
            });

            const postoSelect = document.getElementById('func-posto-select');
            postoSelect.innerHTML = '<option value="">Posto...</option>' + 
                localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');

            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => {
                const efetivoNoPosto = localDB.equipe.filter(e => e.posto_id === p.id).filter(a => {
                    const hoje = new Date().toISOString().split('T')[0];
                    const siglaAtual = localDB.ocorrencias[`${a.id}-${hoje}`] || 
                        (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    return ['T', 'HI', 'C', 'FG'].includes(siglaAtual);
                }).length;
                
                const statusMinimo = efetivoNoPosto >= (p.minimo || 1) ? '✅' : '⚠️';
                return `<div class="list-item">
                    <span>${p.nome} <strong>(${p.minimo || 1} mín.) ${statusMinimo}</strong></span>
                    <div>
                        <button class="btn-edit" onclick="editMinimo('${p.id}')" title="Editar mínimo">Editar Mín.</button>
                        <button class="btn-remove" onclick="removePosto('${p.id}')">Excluir</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => {
                const posto = localDB.postos.find(p => p.id === e.posto_id);
                return `<div class="list-item">
                    <span>${e.nome} - ${posto ? posto.nome : 'Sem posto'} (${e.escala} | ${e.inicio})</span>
                    <div>
                        <button class="btn-edit" onclick="editAgente('${e.id}')" title="Editar agente">Editar</button>
                        <button class="btn-remove" onclick="removeAgente('${e.id}')">Remover</button>
                    </div>
                </div>`;
            }).join('');
        }

        function openEscala(postoId) {
            const p = localDB.postos.find(x => x.id === postoId);
            document.getElementById('modal-titulo').innerText = `Escala: ${p.nome} (Mínimo: ${p.minimo || 1})`;
            
            const agora = new Date();
            const diasMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
            
            document.getElementById('table-header').innerHTML = 
                '<th>AGENTE</th>' + Array.from({length: diasMes}, (_, i) => `<th>${i+1}</th>`).join('');
            
            document.getElementById('table-body').innerHTML = localDB.equipe
                .filter(e => e.posto_id === postoId)
                .map(a => {
                    let r = `<tr><td style="text-align:left"><strong>${a.nome}</strong></td>`;
                    for(let d=1; d<=diasMes; d++) {
                        const dt = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const s = localDB.ocorrencias[`${a.id}-${dt}`] || 
                            (isTrabalho(dt, a.inicio, a.escala) ? 'T' : 'FO');
                        r += `<td class="cell-${s}" onclick="setSigla('${a.id}', '${dt}', '${postoId}')">${s}</td>`;
                    }
                    return r + '</tr>';
                }).join('');
            
            document.getElementById('modal-escala').style.display = 'block';
            
            // Foco automático na tabela para melhor UX
            setTimeout(() => {
                const tabela = document.getElementById('tabela-escala');
                tabela.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function closeModal() { 
            document.getElementById('modal-escala').style.display = 'none'; 
        }

        function showSection(id) { 
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
        }

        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = 
                new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
            sync();
        }
    </script>
</body>
</html>
