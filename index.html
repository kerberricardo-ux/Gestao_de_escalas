<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas Operacionais</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ef4444;  
            --warning: #f97316; 
            --info: #3b82f6;    
            --border: #333;
            
            --cor-t: #22c55e;     
            --cor-fo: #000000;    
            --cor-f: #ef4444;     
            --cor-su: #ea580c;    
            --cor-at: #06b6d4;    
            --cor-fe: #3b82f6;    
            --cor-hi: #16a34a;    
            --cor-fg: #84cc16;    
            --cor-c: #f97316;     
            --cor-af: #8b5cf6;    
            --cor-tc: #374151;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); display: flex; min-height: 100vh; }

        .sidebar { width: 220px; background: #000; padding: 20px; position: fixed; height: 100vh; border-right: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active-nav { background: rgba(0, 230, 118, 0.1); color: var(--accent); }

        .content { margin-left: 220px; padding: 30px; width: calc(100% - 220px); }
        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 6px solid var(--danger); cursor: pointer; transition: 0.2s; position: relative; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .card.active-status { border-left-color: var(--accent); }
        .card-count { position: absolute; bottom: 12px; right: 12px; background: rgba(0, 230, 118, 0.15); color: var(--accent); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(0, 230, 118, 0.3); text-transform: uppercase; }

        .form-container { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { background: #2c2c2c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; }

        .list-item { background: var(--bg-card); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--bg-card); margin: 2% auto; padding: 25px; width: 95%; max-height: 90vh; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .close { color: white; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        .table-responsive { overflow: auto; flex-grow: 1; border: 1px solid var(--border); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; font-size: 0.85rem; }
        th { background: #111; position: sticky; top: 0; z-index: 2; }

        .cell-T { background: var(--cor-t) !important; color: white; font-weight: bold; }
        .cell-FO { background: var(--cor-fo) !important; color: #555; }
        .cell-F { background: var(--cor-f) !important; color: white; }
        .cell-SU { background: var(--cor-su) !important; color: white; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Sentinela</div>
        <button id="nav-dashboard" class="active-nav" onclick="showSection('dashboard')"><i class="material-icons">dashboard</i> Dashboard</button>
        <button id="nav-gestao" onclick="showSection('gestao')"><i class="material-icons">settings</i> Gestão</button>
    </nav>

    <main class="content">
        <section id="dashboard" class="active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Postos</h3><div class="value" id="stat-postos">0</div></div>
                <div class="stat-card"><h3>Equipe</h3><div class="value" id="stat-agentes">0</div></div>
                <div class="stat-card alert"><h3>Faltas</h3><div class="value" id="stat-faltas">0</div></div>
            </div>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <section id="gestao">
            <h2>Gestão de Unidades e Equipe</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome do Posto">
                <button class="btn-add" onclick="addPosto()">Adicionar Posto</button>
            </div>
            <div id="lista-postos"></div>
            <hr style="margin:20px 0; border-color:var(--border)">
            <div class="form-container">
                <input type="text" id="func-nome" placeholder="Nome do Agente">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="5x1">5x1</option>
                    <option value="6x1">6x1</option>
                </select>
                <input type="date" id="func-inicio">
                <button class="btn-add" onclick="addAgente()">Cadastrar Agente</button>
            </div>
            <div id="lista-equipe"></div>
        </section>

        <div id="modal-escala" class="modal">
            <div class="modal-content">
                <div><span class="close" onclick="closeModal()">&times;</span><h3 id="modal-titulo"></h3></div>
                <div class="table-responsive">
                    <table id="tabela-escala">
                        <thead><tr id="table-header"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co'; 
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {} };

        // CORREÇÃO DA FUNÇÃO DE ESCALA PARA EVITAR ERRO DE FUSO HORÁRIO
        function isTrabalho(dataStr, inicioStr, escala) {
            const [anoI, mesI, diaI] = inicioStr.split('-').map(Number);
            const [anoA, mesA, diaA] = dataStr.split('-').map(Number);
            
            const dI = new Date(anoI, mesI - 1, diaI);
            const dA = new Date(anoA, mesA - 1, diaA);
            
            const diff = Math.round((dA - dI) / 86400000);
            if (diff < 0) return false;

            switch(escala) {
                case '12x36': return diff % 2 === 0;
                case '2x1': return diff % 3 < 2;
                case '5x1': return diff % 6 < 5;
                case '6x1': return diff % 7 < 6;
                case '4x2': return diff % 6 < 4;
                default: return false;
            }
        }

        async function sync() {
            try {
                const { data: p } = await _supabase.from('postos').select('*').order('nome');
                const { data: e } = await _supabase.from('equipe').select('*').order('nome');
                const { data: o } = await _supabase.from('ocorrencias').select('*');
                localDB.postos = p || [];
                localDB.equipe = e || [];
                localDB.ocorrencias = {};
                o?.forEach(occ => localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla);
                renderAll();
            } catch (err) { console.error(err); }
        }

        async function addPosto() {
            const n = document.getElementById('posto-nome').value;
            if (!n) return;
            await _supabase.from('postos').insert([{ nome: n }]);
            document.getElementById('posto-nome').value = '';
            sync();
        }

        async function addAgente() {
            const n = document.getElementById('func-nome').value;
            const p = document.getElementById('func-posto-select').value;
            const e = document.getElementById('func-escala').value;
            const i = document.getElementById('func-inicio').value;
            if (!n || !p || !i) return alert("Preencha todos os campos");
            await _supabase.from('equipe').insert([{ nome: n, posto_id: p, escala: e, inicio: i }]);
            document.getElementById('func-nome').value = '';
            sync();
        }

        async function setSigla(agenteId, data, postoId) {
            const s = prompt("SIGLA: T, FO, F, SU, HI, C, AT, FE ou L (Limpar)").toUpperCase();
            if (!s) return;
            if (s === 'L') await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
            else await _supabase.from('ocorrencias').upsert({ agente_id: agenteId, data, sigla: s });
            await sync();
            openEscala(postoId);
        }

        function renderAll() {
            const hoje = new Date().toISOString().split('T')[0];
            let faltas = 0;
            
            localDB.equipe.forEach(ag => {
                if (localDB.ocorrencias[`${ag.id}-${hoje}`] === 'F') faltas++;
            });

            document.getElementById('stat-postos').innerText = localDB.postos.length;
            document.getElementById('stat-agentes').innerText = localDB.equipe.length;
            document.getElementById('stat-faltas').innerText = faltas;

            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            localDB.postos.forEach(p => {
                const ags = localDB.equipe.filter(e => e.posto_id === p.id);
                const emServico = ags.filter(a => {
                    const s = localDB.ocorrencias[`${a.id}-${hoje}`] || (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    return ['T', 'HI', 'C', 'FG'].includes(s);
                });

                const card = document.createElement('div');
                card.className = `card ${emServico.length > 0 ? 'active-status' : ''}`;
                card.innerHTML = `<h3>${p.nome}</h3><p>${emServico.length > 0 ? '🟢 OPERACIONAL' : '🔴 VAGO'}</p><div class="card-count">${emServico.length} EFETIVO</div>`;
                card.onclick = () => openEscala(p.id);
                container.appendChild(card);
            });

            document.getElementById('func-posto-select').innerHTML = localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => `<div class="list-item">${p.nome}</div>`).join('');
            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => `<div class="list-item">${e.nome} (${e.escala})</div>`).join('');
        }

        function openEscala(postoId) {
            const p = localDB.postos.find(x => x.id === postoId);
            document.getElementById('modal-titulo').innerText = "Escala: " + p.nome;
            const agora = new Date();
            const diasMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
            document.getElementById('table-header').innerHTML = '<th>AGENTE</th>' + Array.from({length: diasMes}, (_, i) => `<th>${i+1}</th>`).join('');
            document.getElementById('table-body').innerHTML = localDB.equipe.filter(e => e.posto_id === postoId).map(a => {
                let r = `<tr><td>${a.nome}</td>`;
                for(let d=1; d<=diasMes; d++) {
                    const dt = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const s = localDB.ocorrencias[`${a.id}-${dt}`] || (isTrabalho(dt, a.inicio, a.escala) ? 'T' : 'FO');
                    r += `<td class="cell-${s}" onclick="setSigla('${a.id}', '${dt}', '${postoId}')">${s}</td>`;
                }
                return r + '</tr>';
            }).join('');
            document.getElementById('modal-escala').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = sync;
    </script>
</body>
</html>
