<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela - Gestão de Escalas Operacionais</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ef4444;  
            --warning: #f97316; 
            --info: #3b82f6;    
            --border: #333;
            --cor-t: #22c55e;     
            --cor-fo: #000000;    
            --cor-f: #ef4444;     
            --cor-su: #ea580c;    
            --cor-at: #06b6d4;    
            --cor-fe: #3b82f6;    
            --cor-hi: #16a34a;    
            --cor-fg: #84cc16;    
            --cor-c: #f97316;     
            --cor-af: #8b5cf6;    
            --cor-tc: #374151;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); display: flex; min-height: 100vh; }

        .sidebar { width: 220px; background: #000; padding: 20px; position: fixed; height: 100vh; border-right: 1px solid var(--border); z-index: 100; }
        .logo { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar button { width: 100%; background: none; border: none; color: var(--text-secondary); padding: 15px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar button:hover, .sidebar button.active-nav { background: rgba(0, 230, 118, 0.1); color: var(--accent); }

        .content { margin-left: 220px; padding: 30px; width: calc(100% - 220px); }
        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* NOVO ESTILO PARA CARDS DE ESCALA */
        .escala-container { 
            max-height: 70vh; 
            overflow-y: auto; 
            padding: 10px 0; 
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-card);
        }
        .escala-container::-webkit-scrollbar { width: 6px; }
        .escala-container::-webkit-scrollbar-track { background: var(--bg-card); }
        .escala-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* BLOCO INDIVIDUAL DE AGENTE - NOVO FORMATO VERTICAL */
        .agente-bloco {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .agente-bloco:hover { 
            box-shadow: 0 4px 12px rgba(0,230,118,0.2);
            border-color: var(--accent);
        }

        .agente-header {
            background: linear-gradient(135deg, var(--bg-card), #2a2a2a);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--accent);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* CONTAINER DAS LINHAS (DIAS E ESCALA) */
        .escala-linhas {
            display: flex;
            flex-direction: column;
            min-height: 50px;
        }

        /* LINHA DOS DIAS E LINHA DA ESCALA */
        .escala-row {
            display: grid;
            grid-template-columns: repeat(31, 1fr);
            gap: 1px;
            background: var(--border);
            padding: 8px 0;
        }

        /* CÉLULAS DOS DIAS */
        .dia-cell {
            background: var(--bg-card);
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 6px 2px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: 0.2s;
        }
        .dia-cell:hover { background: rgba(0,230,118,0.1); color: var(--accent); }

        /* CÉLULAS DA ESCALA - CORES MANTIDAS */
        .sigla-cell {
            background: var(--bg-card);
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 8px 4px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            position: relative;
        }
        .sigla-cell:hover { transform: scale(1.05); z-index: 5; }

        /* CORES DAS SIGLAS - MANTIDAS */
        .sigla-T { background: var(--cor-t) !important; color: white; }
        .sigla-FO { background: var(--cor-fo) !important; color: #555; }
        .sigla-F { background: var(--cor-f) !important; color: white; }
        .sigla-SU { background: var(--cor-su) !important; color: white; }
        .sigla-AT { background: var(--cor-at) !important; color: white; }
        .sigla-FE { background: var(--cor-fe) !important; color: white; }
        .sigla-HI { background: var(--cor-hi) !important; color: white; }
        .sigla-FG { background: var(--cor-fg) !important; color: white; }
        .sigla-C { background: var(--cor-c) !important; color: white; }
        .sigla-AF { background: var(--cor-af) !important; color: white; }
        .sigla-TC { background: var(--cor-tc) !important; color: white; }

        /* ESTILOS ANTIGOS MANTIDOS */
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; }
        .stat-card.alert { border-bottom-color: var(--danger); }
        .filter-select { background: #2c2c2c; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; outline: none; }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; border-left: 6px solid var(--danger); cursor: pointer; transition: 0.2s; position: relative; min-height: 120px; }
        .card.minimo-insuficiente { border-left-color: var(--warning) !important; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); animation: pulse-warning 2s infinite; }
        @keyframes pulse-warning { 0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); } 50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.6); } }
        .card.active-status { border-left-color: var(--accent); }
        .card-count { position: absolute; bottom: 12px; right: 12px; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(0, 230, 118, 0.3); text-transform: uppercase; }
        .card-count.minimo-alerta { background: rgba(249, 115, 22, 0.2); color: var(--warning); border-color: rgba(249, 115, 22, 0.5); font-size: 0.8rem; }

        /* MODAL ATUALIZADO */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--bg-card); margin: 2% auto; padding: 20px; width: 95%; max-width: 1400px; max-height: 95vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .close { font-size: 24px; cursor: pointer; color: var(--text-secondary); font-weight: bold; line-height: 1; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .close:hover { background: rgba(255,255,255,0.1); }

        /* FORMULÁRIOS E LISTAS */
        .form-container { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        input, select { background: #2c2c2c; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add, .btn-edit, .btn-save, .btn-cancel { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; margin: 0 5px; }
        .btn-edit, .btn-save { background: var(--info); }
        .btn-cancel { background: var(--warning); color: white; }
        .btn-remove { background: var(--danger); color: white; }
        .list-item { background: var(--bg-card); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .content { margin-left: 0; padding: 15px; width: 100%; }
            .sidebar { transform: translateX(-100%); }
            .escala-row { grid-template-columns: repeat(15, 1fr); }
            .dia-cell, .sigla-cell { font-size: 0.7rem; padding: 4px 1px; min-height: 28px; }
            .agente-header { font-size: 0.85rem; padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <!-- HTML da sidebar e main permanece igual -->
    <nav class="sidebar">
        <div class="logo">SENTINELA GESTÃO DE ESCALAS</div>
        <button onclick="showSection('dashboard_gerencial')" id="nav-dashboard_gerencial" class="active-nav">
            <span class="material-icons">analytics</span> <span>Gerencial</span>
        </button>
        <button onclick="showSection('dashboard')" id="nav-dashboard">
            <span class="material-icons">monitor_heart</span> <span>Tempo Real</span>
        </button>
        <button onclick="showSection('postos')" id="nav-postos">
            <span class="material-icons">business</span> <span>Postos</span>
        </button>
        <button onclick="showSection('equipe')" id="nav-equipe">
            <span class="material-icons">groups</span> <span>Equipe</span>
        </button>
    </nav>

    <main class="content">
        <!-- Dashboard gerencial permanece igual -->
        <section id="dashboard_gerencial" class="active">
            <div class="stats-header">
                <h2>Resumo Gerencial</h2>
                <select id="filtro-periodo" class="filter-select" onchange="renderAll()">
                    <option value="dia">Hoje</option>
                    <option value="mes">Mês Atual</option>
                </select>
            </div>
            <!-- Stats grid permanece igual -->
            <div class="stats-grid">
                <div class="stat-card"><h3>Postos Ativos</h3><div class="value" id="stat-postos">0</div></div>
                <div class="stat-card"><h3>Efetivo Total</h3><div class="value" id="stat-agentes">0</div></div>
                <div class="stat-card alert"><h3>Faltas</h3><div class="value" id="stat-faltas">0</div></div>
                <div class="stat-card alert"><h3>Suspensões</h3><div class="value" id="stat-suspensoes">0</div></div>
                <div class="stat-card"><h3>Atestados</h3><div class="value" id="stat-atestados">0</div></div>
            </div>
        </section>

        <!-- NOVO DASHBOARD COM CARDS -->
        <section id="dashboard">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Painel Operacional (Hoje)</h2>
                <div id="current-date" style="font-weight: bold; color: var(--accent);"></div>
            </header>
            <div id="cards-container" class="grid-cards"></div>
        </section>

        <!-- Seções de postos e equipe permanecem iguais -->
        <section id="postos">
            <h2>Gestão de Unidades</h2>
            <div class="form-container">
                <input type="text" id="posto-nome" placeholder="Nome da Unidade">
                <input type="number" id="posto-minimo" placeholder="Mínimo" min="1" max="50" style="min-width: 100px;">
                <button class="btn-add" onclick="addPosto()">Criar Posto</button>
            </div>
            <div id="lista-postos"></div>
        </section>

        <section id="equipe">
            <h2>Gestão de Agentes</h2>
            <div class="form-container">
                <input type="text" id="func-nome" placeholder="Nome Completo">
                <select id="func-posto-select"></select>
                <select id="func-escala">
                    <option value="12x36">12x36</option>
                    <option value="2x1">2x1</option>
                    <option value="5x1">5x1</option>
                    <option value="6x1">6x1</option>
                    <option value="4x2">4x2</option>
                </select>
                <input type="date" id="func-inicio" title="Data de Início do Ciclo">
                <button class="btn-add" onclick="addAgente()">Cadastrar</button>
            </div>
            <div id="lista-equipe"></div>
        </section>

        <!-- MODAL ATUALIZADO COM NOVO FORMATO -->
        <div id="modal-escala" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-titulo" style="margin: 0;">Escala</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="escala-container" id="escala-content">
                    <!-- NOVO CONTEÚDO SERÁ INJETADO AQUI -->
                </div>
            </div>
        </div>

        <!-- Modal de edição permanece igual -->
        <div id="modal-edit-agente" class="modal">
            <!-- Conteúdo igual ao anterior -->
        </div>
    </main>

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co'; 
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {} };
        let agenteEditando = null;

        // FUNÇÕES EXISTENTES PERMANECEM IGUAIS (sync, isTrabalho, addPosto, etc.)
        // ... (todas as funções anteriores mantidas)

        // NOVA FUNÇÃO openEscala() - FORMATO VERTICAL POR AGENTE
        function openEscala(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            document.getElementById('modal-titulo').innerText = `Escala: ${posto.nome} (Mínimo: ${posto.minimo || 1})`;
            
            const agora = new Date();
            const ano = agora.getFullYear();
            const mes = agora.getMonth() + 1;
            const diasMes = new Date(ano, mes, 0).getDate();
            
            // Filtrar agentes do posto
            const agentesPosto = localDB.equipe.filter(e => e.posto_id === postoId);
            
            let html = '';
            agentesPosto.forEach(agente => {
                html += `<div class="agente-bloco" data-agente-id="${agente.id}">
                    <div class="agente-header">${agente.nome} (${agente.escala})</div>
                    <div class="escala-linhas">
                        <!-- Linha dos dias -->
                        <div class="escala-row">
                            ${Array.from({length: diasMes}, (_, i) => 
                                `<div class="dia-cell" data-dia="${i+1}">${i+1}</div>`
                            ).join('')}
                        </div>
                        <!-- Linha da escala -->
                        <div class="escala-row">
                            ${Array.from({length: diasMes}, (_, i) => {
                                const dia = String(i+1).padStart(2, '0');
                                const data = `${ano}-${String(mes).padStart(2,'0')}-${dia}`;
                                const sigla = localDB.ocorrencias[`${agente.id}-${data}`] || 
                                    (isTrabalho(data, agente.inicio, agente.escala) ? 'T' : 'FO');
                                
                                return `<div class="sigla-cell sigla-${sigla}" 
                                        data-agente="${agente.id}" 
                                        data-data="${data}"
                                        data-posto="${postoId}"
                                        title="${sigla} - ${data}">${sigla}</div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            });
            
            document.getElementById('escala-content').innerHTML = html;
            
            // Adicionar event listeners para cliques nas células
            document.querySelectorAll('.sigla-cell').forEach(cell => {
                cell.onclick = function() {
                    const agenteId = this.dataset.agente;
                    const data = this.dataset.data;
                    const postoId = this.dataset.posto;
                    setSiglaVertical(agenteId, data, postoId);
                };
            });
            
            document.getElementById('modal-escala').style.display = 'block';
        }

        // NOVA FUNÇÃO para editar sigla no formato vertical
        async function setSiglaVertical(agenteId, data, postoId) {
            const mensagem = `DIGITE A SIGLA:\n\n` +
                `T  = Trabalho\n` +
                `FO = Folga\n` +
                `FG = Folguista\n` +
                `F  = Falta\n` +
                `SU = Suspensão\n` +
                `HI = Hora Extra\n` +
                `C  = Cobertura\n` +
                `AT = Atestado\n` +
                `FE = Férias\n` +
                `L  = Limpar\n\n` +
                `(Pressione Backspace com campo vazio para LIMPAR)`;

            const sigla = prompt(mensagem)?.toUpperCase().trim();
            
            if (!sigla || sigla === '') {
                await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
                await sync();
                openEscala(postoId);
                return;
            }

            if (sigla === 'L') {
                await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
            } else {
                await _supabase.from('ocorrencias').upsert({ agente_id: agenteId, data, sigla });
            }
            
            await sync();
            openEscala(postoId);
        }

        // Função closeModal permanece igual
        function closeModal() { 
            document.getElementById('modal-escala').style.display = 'none'; 
        }

        // Todas as outras funções permanecem exatamente iguais...
        // (sync, renderAll, addPosto, addAgente, etc.)

        window.onload = () => {
            document.getElementById('current-date').innerText = 
                new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
            sync();
        };

        // Resto do script com todas as funções existentes...
    </script>
</body>
</html>
