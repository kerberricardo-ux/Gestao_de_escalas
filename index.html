<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- HEAD igual ao seu -->
</head>
<body>
    <!-- HTML igual ao seu até o SCRIPT -->

    <script>
        const SB_URL = 'https://odvzkosujluparkblizr.supabase.co'; 
        const SB_KEY = 'sb_publishable_K_SPgZndx26WP11_tt6fsw_dmsD7Zou'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let localDB = { postos: [], equipe: [], ocorrencias: {} };

        async function sync() {
            try {
                const { data: p } = await _supabase.from('postos').select('*').order('nome');
                const { data: e } = await _supabase.from('equipe').select('*').order('nome');
                const { data: o } = await _supabase.from('ocorrencias').select('*');
                localDB.postos = p || [];
                localDB.equipe = e || [];
                localDB.ocorrencias = {};
                o?.forEach(occ => localDB.ocorrencias[`${occ.agente_id}-${occ.data}`] = occ.sigla);
                renderAll();
            } catch (err) { 
                console.error('Erro sync:', err); 
                alert('Erro ao sincronizar dados!');
            }
        }

        function isTrabalho(data, inicio, escala) {
            const dI = new Date(inicio + 'T00:00:00');
            const dA = new Date(data + 'T00:00:00');
            const diff = Math.floor((dA - dI) / 86400000);
            if (diff < 0) return false;
            switch(escala) {
                case '12x36': return diff % 2 === 0;
                case '2x1': return diff % 3 < 2;
                case '5x1': return diff % 6 < 5;
                case '6x1': return diff % 7 < 6;
                case '4x2': return diff % 6 < 4;
                default: return false;
            }
        }

        // ✅ CORRIGIDO: addPosto
        async function addPosto() {
            const n = document.getElementById('posto-nome').value.trim();
            const m = parseInt(document.getElementById('posto-minimo').value) || 2;
            if (!n) return alert("Digite o nome do posto");
            if (m < 1 || m > 50) return alert("Mínimo deve ser entre 1 e 50");
            
            try {
                await _supabase.from('postos').insert([{ nome: n, minimo: m }]);
                document.getElementById('posto-nome').value = '';
                document.getElementById('posto-minimo').value = '';
                await sync(); // ← AGUARDA sync
            } catch(err) {
                alert('Erro ao criar posto: ' + err.message);
            }
        }

        // ✅ CORRIGIDO: editMinimo
        async function editMinimo(postoId) {
            const posto = localDB.postos.find(p => p.id === postoId);
            if(!posto) return alert('Posto não encontrado');
            
            const novoMinimo = prompt(`Mínimo atual: ${posto.minimo || 2}\nDigite novo mínimo (1-50):`, posto.minimo || 2);
            const m = parseInt(novoMinimo);
            if (isNaN(m) || m < 1 || m > 50) return alert("Mínimo inválido (1-50)");
            
            try {
                await _supabase.from('postos').update({ minimo: m }).eq('id', postoId);
                await sync();
            } catch(err) {
                alert('Erro ao editar: ' + err.message);
            }
        }

        // ✅ CORRIGIDO: setSigla (PRINCIPAL BUG)
        async function setSigla(agenteId, data, postoId) {
            const s = prompt("DIGITE A SIGLA:\nT=Trabalho\nFO=Folga\nFG=Folguista\nF=Falta\nSU=Suspensão\nHI=Hora Extra\nC=Cobertura\nAT=Atestado\nFE=Férias\nL=Limpar").toUpperCase().trim();
            
            if (!s) return;
            
            try {
                if (s === 'L') {
                    await _supabase.from('ocorrencias').delete().match({ agente_id: agenteId, data });
                } else {
                    await _supabase.from('ocorrencias').upsert({ 
                        agente_id: agenteId, 
                        data: data, 
                        sigla: s 
                    });
                }
                await sync(); // ← AGUARDA sync completar
                // openEscala(postoId); // ← REMOVIDO para evitar loop
            } catch(err) {
                alert('Erro ao salvar: ' + err.message);
            }
        }

        // Resto das funções iguais...
        async function removePosto(id) {
            if(confirm("Excluir posto e todos os agentes?")) { 
                await _supabase.from('postos').delete().eq('id', id); 
                await sync(); 
            }
        }

        async function addAgente() {
            const n = document.getElementById('func-nome').value.trim();
            const p = document.getElementById('func-posto-select').value;
            const e = document.getElementById('func-escala').value;
            const i = document.getElementById('func-inicio').value;
            if (!n || !p || !i) return alert("Preencha todos os campos");
            try {
                await _supabase.from('equipe').insert([{ nome: n, posto_id: p, escala: e, inicio: i }]);
                document.getElementById('func-nome').value = '';
                await sync();
            } catch(err) {
                alert('Erro ao cadastrar: ' + err.message);
            }
        }

        async function removeAgente(id) {
            if(confirm("Remover agente?")) { 
                await _supabase.from('equipe').delete().eq('id', id); 
                await sync(); 
            }
        }

        // ✅ CORRIGIDO: renderAll com DEBUG
        function renderAll() {
            const hoje = new Date().toISOString().split('T')[0];
            console.log('🔄 renderAll - Hoje:', hoje); // DEBUG
            
            let totalFaltas = 0, totalSu = 0, totalAt = 0;
            localDB.equipe.forEach(ag => {
                const s = localDB.ocorrencias[`${ag.id}-${hoje}`];
                if (s === 'F') totalFaltas++; 
                if (s === 'SU') totalSu++; 
                if (s === 'AT') totalAt++;
            });

            // Stats gerencial
            document.getElementById('stat-postos').innerText = localDB.postos.length;
            document.getElementById('stat-agentes').innerText = localDB.equipe.length;
            document.getElementById('stat-faltas').innerText = totalFaltas;
            document.getElementById('stat-suspensoes').innerText = totalSu;
            document.getElementById('stat-atestados').innerText = totalAt;
            
            document.getElementById('lista-unidades-gestao').innerHTML = 
                localDB.postos.map(p => `• ${p.nome} (${p.minimo || 2} mín.)`).join('<br>');

            // ✅ CARDS COM MÍNIMO CORRIGIDO
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            localDB.postos.forEach(p => {
                const ags = localDB.equipe.filter(e => e.posto_id === p.id);
                const minimo = p.minimo || 2; // DEFAULT 2
                console.log(`📊 ${p.nome}: ${ags.length} agentes, mínimo ${minimo}`); // DEBUG
                
                const servicoNoPosto = ags.filter(a => {
                    const siglaAtual = localDB.ocorrencias[`${a.id}-${hoje}`] || 
                        (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    const emServico = ['T', 'HI', 'C', 'FG'].includes(siglaAtual);
                    console.log(`  ${a.nome}: ${siglaAtual} → ${emServico ? 'SIM' : 'NÃO'}`); // DEBUG
                    return emServico;
                });

                console.log(`✅ ${p.nome}: ${servicoNoPosto.length}/${minimo} em serviço`); // DEBUG

                const temMinimoSuficiente = servicoNoPosto.length >= minimo;
                const classesCard = [
                    'card',
                    servicoNoPosto.length > 0 ? 'active-status' : '',
                    !temMinimoSuficiente ? 'minimo-insuficiente' : ''
                ].filter(Boolean).join(' ');
                
                let statusText = servicoNoPosto.length > 0 ? '🟢 OPERACIONAL' : '🔴 VAGO';
                if (!temMinimoSuficiente) {
                    statusText = `⚠️ ABAIXO DO MÍNIMO (${minimo})`;
                }
                
                const card = document.createElement('div');
                card.className = classesCard;
                card.innerHTML = `
                    <h3>${p.nome}</h3>
                    <p>${statusText}</p>
                    <div class="card-count ${!temMinimoSuficiente ? 'minimo-alerta' : ''}">
                        ${servicoNoPosto.length}/${minimo} EFETIVO
                    </div>
                `;
                card.onclick = () => openEscala(p.id);
                container.appendChild(card);
            });

            // Listas
            document.getElementById('func-posto-select').innerHTML = 
                '<option value="">Posto...</option>' + 
                localDB.postos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
                
            document.getElementById('lista-postos').innerHTML = localDB.postos.map(p => {
                const hoje = new Date().toISOString().split('T')[0];
                const emServico = localDB.equipe.filter(e => e.posto_id === p.id).filter(a => {
                    const siglaAtual = localDB.ocorrencias[`${a.id}-${hoje}`] || 
                        (isTrabalho(hoje, a.inicio, a.escala) ? 'T' : 'FO');
                    return ['T', 'HI', 'C', 'FG'].includes(siglaAtual);
                }).length;
                const statusMinimo = emServico >= (p.minimo || 2) ? '✅' : '⚠️';
                return `<div class="list-item">
                    <span>${p.nome} <strong>(${p.minimo || 2} mín.) ${statusMinimo}</strong></span>
                    <div>
                        <button class="btn-edit" onclick="editMinimo('${p.id}')" title="Editar mínimo">Editar Mín.</button>
                        <button onclick="removePosto('${p.id}')" style="background: var(--danger); color: white; margin-left: 5px;">Excluir</button>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('lista-equipe').innerHTML = localDB.equipe.map(e => {
                const posto = localDB.postos.find(p => p.id === e.posto_id);
                return `<div class="list-item">
                    <span>${e.nome} - ${posto ? posto.nome : 'Sem posto'}</span>
                    <button onclick="removeAgente('${e.id}')" style="background: var(--danger); color: white;">Remover</button>
                </div>`;
            }).join('');
        }

        function openEscala(postoId) {
            const p = localDB.postos.find(x => x.id === postoId);
            if(!p) return alert('Posto não encontrado');
            
            document.getElementById('modal-titulo').innerText = `Escala: ${p.nome} (Mín: ${p.minimo || 2})`;
            const agora = new Date();
            const diasMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
            document.getElementById('table-header').innerHTML = 
                '<th>AGENTE</th>' + Array.from({length: diasMes}, (_, i) => `<th>${i+1}</th>`).join('');
                
            document.getElementById('table-body').innerHTML = 
                localDB.equipe.filter(e => e.posto_id === postoId).map(a => {
                    let r = `<tr><td style="text-align:left"><strong>${a.nome}</strong></td>`;
                    for(let d=1; d<=diasMes; d++) {
                        const dt = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const s = localDB.ocorrencias[`${a.id}-${dt}`] || 
                            (isTrabalho(dt, a.inicio, a.escala) ? 'T' : 'FO');
                        r += `<td class="cell-${s}" onclick="setSigla('${a.id}', '${dt}', '${postoId}')" style="cursor:pointer">${s}</td>`;
                    }
                    return r + '</tr>';
                }).join('');
            document.getElementById('modal-escala').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal-escala').style.display = 'none'; }
        function showSection(id) { 
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id)?.classList.add('active');
            document.getElementById('nav-' + id)?.classList.add('active-nav');
            if(id === 'dashboard') renderAll(); // ← FORÇA UPDATE
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = 
                new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});
            sync();
        }
    </script>
</body>
</html>
